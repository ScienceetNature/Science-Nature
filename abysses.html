<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plongée dans les Abysses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* --- STYLES GENERAUX --- */
        :root {
            --font-title: 'Cinzel', serif;
            --font-body: 'Montserrat', sans-serif;
            --font-signature: 'Great Vibes', cursive;
            --color-sea-top: #0284c7;

            /* Palette "golden hour" de la scène de surface (zone orange) */
            --sky-1: #fff6e6;
            --sky-2: #ffdb9e;
            --sky-3: #ff9f68;
            --sky-4: #f9704f;
        }

        html {
            overflow-x: hidden;
            width: 100%;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* On cache le curseur par défaut pour le remplacer par le combo sous-marin + viseur */
            cursor: none !important;
        }

        body {
            font-family: var(--font-body);
            color: #ffffff;
            overflow-x: hidden;
            background-color: #000000;
            height: 50000px; /* Ajusté dynamiquement par le JS */
        }

        /* ============================================================
           1. ZONE DE SURFACE (« ZONE ORANGE ») — CIEL, ÎLE, SOUS-MARIN
           ============================================================ */
        .surface {
            height: 100vh;
            position: relative;
            overflow: hidden;
            z-index: 10;
            color: #0f172a;
        }

        .surface-sky {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                var(--sky-1) 0%,
                var(--sky-2) 30%,
                var(--sky-3) 54%,
                var(--sky-4) 70%,
                #2f6d7a 100%);
            z-index: 1;
        }

        .sun-glow {
            position: absolute;
            top: 13%;
            left: 64%;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,214,150,0.55) 38%, transparent 72%);
            filter: blur(2px);
            animation: sunPulse 6s ease-in-out infinite;
        }
        @keyframes sunPulse {
            0%, 100% { opacity: 0.92; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.07); }
        }

        .cloud {
            position: absolute;
            background: rgba(255,255,255,0.6);
            border-radius: 50px;
            filter: blur(2px);
            animation: driftCloud linear infinite;
            z-index: 2;
        }
        .cloud-1 { width: 170px; height: 34px; top: 9%;  left: -15%; animation-duration: 75s; }
        .cloud-2 { width: 110px; height: 24px; top: 21%; left: 35%;  animation-duration: 95s; opacity: 0.45; }
        .cloud-3 { width: 140px; height: 28px; top: 6%;  left: 65%;  animation-duration: 85s; opacity: 0.55; }
        @keyframes driftCloud {
            0%   { transform: translateX(0); }
            100% { transform: translateX(140vw); }
        }

        .horizon-haze {
            position: absolute;
            left: 0;
            width: 100%;
            bottom: 130px;
            height: 90px;
            background: linear-gradient(180deg, transparent, rgba(255,159,104,0.32) 45%, rgba(26,111,131,0.5) 100%);
            filter: blur(7px);
            z-index: 2;
            pointer-events: none;
        }

        /* --- Texte du titre (point 2 : signature en calligraphie sous le titre) --- */
        .surface-text {
            position: absolute;
            top: 13%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 700px;
            text-align: center;
            z-index: 6;
        }
        .surface-text h1 {
            font-family: var(--font-title);
            font-size: 3.5rem;
            letter-spacing: 4px;
            margin-bottom: 6px;
            text-shadow: 0 2px 18px rgba(255,255,255,0.35);
        }
        .surface-signature {
            font-family: var(--font-signature);
            font-size: 1.9rem;
            font-weight: 400;
            margin-bottom: 22px;
            opacity: 0.85;
            letter-spacing: 1px;
        }
        .surface-subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.75;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .surface-ocean {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 130px;
            overflow: hidden;
            z-index: 4;
            background: var(--color-sea-top);
        }
        /* Vagues animées de la zone de surface (surface-ocean) — remontées pour couvrir
           toute la hauteur de la section et supprimer la bande plate "morte" au-dessus */
        .wave {
            position: absolute;
            left: 0;
            width: 200%;
            height: 90px;
            animation: waveScroll linear infinite;
        }
        @keyframes waveScroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .surface-ocean .wave-back  { top: 0px; opacity: 0.6;  animation-duration: 24s; }
        .surface-ocean .wave-mid   { top: 4px; opacity: 0.85; animation-duration: 17s; }
        .surface-ocean .wave-front { top: 8px; opacity: 1;    animation-duration: 12s; }

        /* --- DEGRADE DE LUMIERE --- */
        /* Dégradé de profondeur découpé en plusieurs segments (au lieu d'un bloc unique de
           12000px) : certains moteurs de rendu mobiles affichent des artefacts (bandes noires)
           sur les très grands éléments dégradés d'un seul tenant. Le rendu visuel est identique. */
        .ocean-light-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 12000px;
            pointer-events: none;
            z-index: 1;
        }
        .ocean-light-glow .glow-segment {
            position: absolute;
            left: 0;
            width: 100%;
            height: 3000px;
        }
        .glow-segment-1 { top: 0;     background: linear-gradient(to bottom, var(--color-sea-top) 0%, #0c356a 80%, #0a305f 100%); }
        .glow-segment-2 { top: 3000px; background: linear-gradient(to bottom, #0a305f 0%, #011627 100%); }
        .glow-segment-3 { top: 6000px; background: linear-gradient(to bottom, #011627 0%, #010b14 100%); }
        .glow-segment-4 { top: 9000px; background: linear-gradient(to bottom, #010b14 0%, #000000 100%); }

        /* ============================================================
           4. NEIGE MARINE SUR 3 PLANS DE PROFONDEUR (PARALLAXE)
           ============================================================ */
        .snow-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            z-index: 3;
            background-repeat: repeat;
        }
        .snow-layer-back {
            background-size: 320px 320px;
            background-image:
                radial-gradient(1px 1px at 30px 40px, rgba(220,230,240,0.5), transparent),
                radial-gradient(1px 1px at 140px 200px, rgba(220,230,240,0.4), transparent),
                radial-gradient(1px 1px at 230px 90px, rgba(220,230,240,0.45), transparent);
        }
        .snow-layer-mid {
            background-size: 360px 360px;
            background-image:
                radial-gradient(1.5px 1.5px at 50px 70px, rgba(230,240,245,0.55), transparent),
                radial-gradient(1.4px 1.4px at 180px 240px, rgba(230,240,245,0.45), transparent),
                radial-gradient(1.5px 1.5px at 280px 120px, rgba(230,240,245,0.5), transparent);
        }
        .snow-layer-front {
            background-size: 400px 400px;
            background-image:
                radial-gradient(2.2px 2.2px at 60px 80px, rgba(240,248,250,0.75), transparent),
                radial-gradient(2px 2px at 220px 260px, rgba(240,248,250,0.6), transparent),
                radial-gradient(2.2px 2.2px at 330px 140px, rgba(240,248,250,0.7), transparent),
                radial-gradient(2px 2px at 150px 340px, rgba(240,248,250,0.55), transparent);
        }

        /* --- BIOLUMINESCENCE ALEATOIRE (point 6) --- */
        .biolum-dot {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            animation: biolumFlash 1s ease-in-out forwards;
        }
        @keyframes biolumFlash {
            0%   { opacity: 0; transform: scale(0.3); }
            30%  { opacity: 1; transform: scale(1); }
            70%  { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        /* --- SOUS-MARIN ET CURSEUR EXTENSION --- */
        #sub-pilot-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 210px;  /* Taille X1.5 globale */
            height: 120px;
            pointer-events: none; /* Laisse passer les clics à travers le container */
            z-index: 100;
        }

        .sub-image {
            position: absolute;
            left: 25px;   /* Valeur par défaut initiale */
            top: 20px;    /* Valeur par défaut initiale */
            width: 210px; /* Agrandissement X1.5 de l'image du sous-marin */
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* Le point de clic précis (Viseur) placé au-dessus et à gauche du sous-marin */
        .sub-crosshair {
            position: absolute;
            left: 0;
            top: 0;
            transform: translate(-50%, -50%); /* Centrage parfait et absolu sur la pointe réelle de la souris */
            width: 12px;
            height: 12px;
            background-color: #2dd4bf;
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 12px #2dd4bf;
        }

        /* --- CONTROLEUR AUDIO DESIGN ALIGNÉ ET PLACÉ EN HAUT --- */
        .audio-control-panel {
            position: fixed;
            left: 30px;
            top: 40px; /* Placé le plus haut possible sur la page */
            width: 40px; /* Même largeur pour un alignement parfait sur l'axe */
            z-index: 90;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .volume-pill-container {
            width: 24px;
            height: 130px;
            background-color: #141619;
            border: 1px solid #22252a;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8), 0 4px 12px rgba(0,0,0,0.5);
        }

        .volume-track-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%; /* Géré par le JS */
            background: linear-gradient(to top, #005f73, #0a9396, #2dd4bf); /* Dégradé nuances bleu turquoise */
            box-shadow: 0 0 12px rgba(45, 212, 191, 0.4);
            transition: height 0.05s linear;
        }

        .audio-btn {
            background: none;
            border: none;
            outline: none;
            color: #94a3b8;
            transition: color 0.2s, transform 0.2s;
        }
        .audio-btn:hover { color: #2dd4bf; transform: scale(1.1); }
        .audio-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* --- INTERFACE TEXTUELLE FIXE (UI) --- */
        /* ============================================================
           REGLE VERTICALE DE PROFONDEUR (remplace la ligne pointillée
           ET l'ancien compteur numérique). Fond transparent (point 4),
           occupe toute la hauteur de la page (point 2).
           Flèche blanche statique + échelle qui défile en fonction du scroll
           ============================================================ */
        .depth-ruler {
            position: fixed;
            right: 34px;
            top: 24px;
            bottom: 24px;
            width: 74px;
            z-index: 80;
            display: flex;
            align-items: center;
            background: transparent;
            opacity: 0;
            transition: opacity 0.5s;
        }
        body.submerged .depth-ruler { opacity: 1; }

        .ruler-window {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .ruler-track {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }
        .ruler-tick {
            position: absolute;
            left: 10px;
            top: 50%;
            width: 14px;
            height: 1px;
            background: rgba(255,255,255,0.5);
        }
        .ruler-tick.major {
            width: 22px;
            height: 2px;
            background: #ffffff;
        }
        .ruler-label {
            position: absolute;
            left: 26px;
            top: -7px;
            font-size: 0.68rem;
            color: #ffffff;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
            opacity: .9;
        }
        .ruler-arrow {
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-left: 10px solid #ffffff;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.85));
            z-index: 2;
        }

        .zone-indicator {
            position: fixed;
            left: 30px;
            bottom: 40px;
            width: 40px; /* Même largeur pour un alignement d'axe parfait avec le panel audio */
            display: flex;
            justify-content: center;
            align-items: center;
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            opacity: 0;
            z-index: 80;
            font-weight: 600;
            transition: opacity 0.5s;
        }
        body.submerged .zone-indicator { opacity: 0.4; }

        /* --- PALIERS DE DESCRIPTION TEXTUELS (STYLE NEAL.FUN) --- */
        .depth-milestone {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 700px;
            text-align: center;
            z-index: 4;
            pointer-events: none;
        }

        .milestone-title {
            font-family: var(--font-title);
            font-size: 2rem;
            letter-spacing: 2px;
            color: #38bdf8;
            margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .milestone-desc {
            font-family: var(--font-body);
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            opacity: 0.75;
            color: #f1f5f9;
        }

        /* --- ANIMAUX --- */
        .abyss-container {
            position: relative;
            width: 100%;
            height: calc(100% - 100vh);
        }

        .animal-card {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 6;
            content-visibility: auto;
            contain-intrinsic-size: 220px 300px;
        }

        .pos-gauche { left: 12%; }
        .pos-milieu-gauche { left: 28%; }
        .pos-milieu { left: 50%; transform: translateX(-50%); }
        .pos-milieu-droite { right: 28%; }
        .pos-droite { right: 12%; }

        /* Seule l'image de l'animal bouge : nom / nom latin / taille restent statiques */
        @keyframes swimAnimation {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(var(--img-scale, 1)); }
            50% { transform: translateY(-12px) rotate(1.2deg) scale(var(--img-scale, 1)); }
        }

        .animal-card img,
        .animal-card video {
            width: 100%; /* S'adapte à la taille de la carte configurée en JS */
            height: auto;
            aspect-ratio: 1 / 1; /* Réserve une place approximative tant que le média charge */
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
            transition: filter 0.3s, opacity 0.6s ease;
            --img-scale: 1;
            animation: swimAnimation 6s ease-in-out infinite;
            background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%);
        }
        /* Image et vidéo restent invisibles jusqu'au chargement réel, puis
           apparaissent en fondu — la marge de 200m laisse largement le temps
           à la première image de la vidéo d'arriver avant que l'utilisateur
           ne scrolle jusque-là, donc pas besoin de vignette séparée. */
        .animal-card img,
        .animal-card video {
            opacity: 0;
        }
        .animal-card img.loaded,
        .animal-card video.loaded {
            opacity: 1;
        }

        .animal-card:hover img,
        .animal-card:hover video {
            filter: drop-shadow(0 0 25px rgba(45, 212, 191, 0.6));
            --img-scale: 1.04;
        }

        .animal-name { font-size: 1.1rem; font-weight: 600; margin-top: 12px; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }
        .animal-latin { font-size: 0.85rem; font-style: italic; opacity: 0.6; margin-top: 2px; }
        .animal-size { font-size: 0.8rem; opacity: 0.4; margin-top: 2px; }

        /* Tooltip Anecdote */
        .animal-tooltip {
            position: absolute;
            bottom: 100%;
            background: rgba(9, 10, 11, 0.95);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            width: min(260px, 65vw);
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            color: #ffffff;
        }
        .animal-card:hover .animal-tooltip { opacity: 1; transform: translateY(-10px); }

        /* --- LE FOND DE LA FOSSE --- */
        .seabed {
            position: absolute;
            width: 100%;
            height: 500px;
            bottom: 0;
            left: 0;
            background: #000000;
            z-index: 8;
        }

        .seabed-rocks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #090a0c;
            clip-path: polygon(0% 45%, 9% 38%, 20% 48%, 31% 33%, 42% 46%, 50% 28%, 61% 42%, 73% 31%, 84% 49%, 93% 36%, 100% 44%, 100% 100%, 0% 100%);
        }

        .seabed-rocks-front {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111316;
            clip-path: polygon(0% 55%, 14% 63%, 28% 48%, 43% 58%, 55% 45%, 70% 62%, 82% 51%, 94% 59%, 100% 48%, 100% 100%, 0% 100%);
            opacity: 0.95;
        }

        .seabed-marker {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: var(--font-title);
            z-index: 10;
            width: 90%;
        }

        .seabed-marker h2 {
            font-size: 2.2rem;
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #38bdf8;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .seabed-marker p {
            font-family: var(--font-body);
            font-size: 0.95rem;
            opacity: 0.5;
        }

        /* ============================================================
           7. NUAGE DE SEDIMENTS AU FOND (déclenché une fois au contact du fond)
           ============================================================ */
        .sediment-cloud {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 55vh;
            pointer-events: none;
            z-index: 9;
            overflow: visible;
        }
        .sediment-particle {
            position: absolute;
            bottom: -20px;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(130,110,90,0.55), rgba(95,80,65,0.25) 55%, transparent 75%);
            filter: blur(7px);
            opacity: 0;
        }
        .sediment-cloud.active .sediment-particle {
            animation: sedimentRise 12s ease-out forwards;
        }
        .sediment-particle.p1 { left: 4%;  width: 260px; height: 160px; animation-delay: 0s; }
        .sediment-particle.p2 { left: 18%; width: 190px; height: 120px; animation-delay: .15s; }
        .sediment-particle.p3 { left: 33%; width: 300px; height: 175px; animation-delay: .05s; }
        .sediment-particle.p4 { left: 50%; width: 210px; height: 130px; animation-delay: .25s; }
        .sediment-particle.p5 { left: 65%; width: 270px; height: 160px; animation-delay: .1s; }
        .sediment-particle.p6 { left: 80%; width: 200px; height: 125px; animation-delay: .3s; }
        .sediment-particle.p7 { left: 42%; width: 340px; height: 195px; animation-delay: 0s; }
        .sediment-particle.p8 { left: 92%; width: 170px; height: 105px; animation-delay: .2s; }
        .sediment-particle.p9 { left: 10%;  width: 155px; height: 100px; animation-delay: .35s; }

        @keyframes sedimentRise {
            0%   { opacity: 0;    transform: translateY(0) scale(0.8); }
            10%  { opacity: 0.95; transform: translateY(-140px) scale(1.1); }
            30%  { opacity: 0.9;  transform: translateY(-240px) scale(1.35); }
            60%  { opacity: 0.6;  transform: translateY(-160px) scale(1.2); }
            100% { opacity: 0;    transform: translateY(0px) scale(0.9); }
        }

        /* --- BULLES --- */
        .bubble {
            position: fixed;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            bottom: -60px;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-110vh) translateX(35px); opacity: 0; }
        }

        /* --- POPUP MEDIAS (CURSEUR RESTAURÉ) --- */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* Force la réapparition du curseur de la souris à l'ouverture d'une popup/anecdote */
        .popup-overlay.active, .popup-overlay.active * {
            cursor: default !important;
        }
        .popup-overlay.active .popup-close, .popup-overlay.active button, .popup-overlay.active video {
            cursor: pointer !important;
        }

        .popup-overlay.active { opacity: 1; pointer-events: auto; }
        .popup-content { position: relative; max-width: 85vw; max-height: 85vh; transform: scale(0.9); transition: transform 0.3s ease; }
        .popup-overlay.active .popup-content { transform: scale(1); }
        .popup-content img, .popup-content video { max-width: 100%; max-height: 85vh; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .popup-close { position: absolute; top: -40px; right: 0; background: none; border: none; color: white; font-size: 2rem; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .surface-text { top: 10%; }
            .surface-text h1 { font-size: 2.2rem; }
            .surface-signature { font-size: 1.3rem; margin-bottom: 14px; }

              taille: "10 cm",
              tailleRelative: "14vw",
              profondeur: 8100,
              anecdote: "Animal vertébré observé le plus profondément sur Terre. Les chercheurs pensent qu'aucun poisson ne peut vivre beaucoup plus bas à cause de la pression.",
              position: "milieu",
              image: "images/icone/limacemaria.webm",
              mediaClick: "images/limacemarianne.mp4"
          }
        ];

        const PIXELS_PER_METER = 14;
        const MAX_DEPTH = 10924;

        const container = document.getElementById('abyss-space');
        const milestonesGroup = document.getElementById('milestones-group');
        const zoneTxt = document.getElementById('zone-txt');
        const floorElement = document.getElementById('ocean-floor');

        // Calcul hauteur globale
        const totalAbyssHeight = MAX_DEPTH * PIXELS_PER_METER;
        // On fige la hauteur de la scène de surface et le point de départ de la zone
        // profonde en pixels (une seule fois, au chargement) plutôt que de laisser deux
        // éléments recalculer chacun 100vh en live : sur mobile, la barre d'adresse qui
        // se réduit pendant le scroll peut recalculer 100vh à des instants légèrement
        // différents selon l'élément, ce qui créait un écart (bande noire) entre la fin
        // de la scène orange et le début du dégradé de profondeur.
        const HERO_PIXEL_HEIGHT = window.innerHeight;
        document.querySelector('.surface').style.height = `${HERO_PIXEL_HEIGHT}px`;

        // Recalcule seulement si la LARGEUR change (rotation/redimensionnement réel) —
        // on ignore volontairement les changements de hauteur seule, qui correspondent
        // le plus souvent à la barre d'adresse mobile qui apparaît/disparaît au scroll.
        let lastKnownWidth = window.innerWidth;
        window.addEventListener('resize', () => {
            if (window.innerWidth !== lastKnownWidth) {
                location.reload();
            }
        });

        document.body.style.height = `${totalAbyssHeight + window.innerHeight + 500}px`;
        floorElement.style.top = `${totalAbyssHeight}px`; // CORRIGÉ : Plus de double décalage de surface

        // GENERATION DES ANIMAUX AVEC TAILLE CUSTOMISEE
        const depthImageQueue = []; // {img, src, profondeur} — alimente le chargement progressif ci-dessous
        animaux.forEach((animal) => {
            const card = document.createElement('div');
            card.className = `animal-card pos-${animal.position}`;
            card.style.width = animal.tailleRelative;

            const topPosition = (animal.profondeur * PIXELS_PER_METER); // CORRIGÉ : Plus de double décalage de surface
            card.style.top = `${topPosition}px`;

            const randomDelay = (Math.random() * -5).toFixed(2);
            card.style.animationDelay = `${randomDelay}s`;

            // Si l'image est un .webm, on génère une <video> muette, en boucle et silencieuse.
            // Pas besoin de vignette séparée : la marge de 200m laisse le temps à la
            // première image de charger avant que l'animal n'arrive à l'écran.
            const isWebm = animal.image.toLowerCase().endsWith('.webm');
            const mediaTag = isWebm
                ? `<video data-src="${animal.image}" class="depth-lazy-img" muted loop playsinline webkit-playsinline preload="auto"></video>`
                : `<img data-src="${animal.image}" alt="${animal.nom}" class="depth-lazy-img">`;

            card.innerHTML = `
                <div class="animal-tooltip">${animal.anecdote}</div>
                ${mediaTag}
                <div class="animal-name">${animal.nom}</div>
                <div class="animal-latin">${animal.nomLatin}</div>
                <div class="animal-size">Taille : ${animal.taille}</div>
            `;

            if (animal.mediaClick && animal.mediaClick.trim() !== "") {
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openPopup(animal.mediaClick);
                });
            }
            container.appendChild(card);

            depthImageQueue.push({
                card: card,
                img: card.querySelector('.depth-lazy-img'),
                src: animal.image,
                profondeur: animal.profondeur
            });
        });

        // ============================================================
        // GESTION DES MÉDIAS À GRANDE ÉCHELLE (jusqu'à ~100 animaux)
        // ------------------------------------------------------------
        // Avec autant d'animaux (et certains en .webm, plus lourds qu'une
        // image), on ne peut plus se permettre de tout charger d'avance,
        // même progressivement. La stratégie retenue repose sur deux
        // marges concentriques, toutes deux basées sur la distance RÉELLE
        // à l'écran (via IntersectionObserver, peu coûteux pour le
        // navigateur, plutôt que recalculée à la main à chaque scroll) :
        //
        //  - Marge large (~200m) : au-delà, le média n'est PAS chargé, ou
        //    est déchargé s'il l'était déjà (source vidée, mémoire libérée).
        //    En dessous, le fichier réel (.webm/.png/.webp) commence à charger.
        //  - Marge étroite (quelques centaines de px) : contrôle uniquement
        //    la LECTURE des vidéos. Une vidéo peut être chargée (donc prête,
        //    poster ou première frame visible) sans être en train de jouer :
        //    elle ne se met en lecture que juste avant d'arriver à l'écran,
        //    et se met en pause dès qu'elle en ressort — jamais plusieurs
        //    vidéos ne jouent en même temps loin les unes des autres.
        //
        // Le poster (vignette statique légère, même nom de fichier en .jpg)
        // s'affiche instantanément pour chaque animal, qu'il soit chargé ou
        // non : il n'y a donc jamais de trou visuel, même en scroll rapide.
        // ============================================================
        const startedSrcs = new Set();

        function preloadAndSwap(entry, onDone) {
            if (startedSrcs.has(entry.src)) { if (onDone) onDone(); return; }
            startedSrcs.add(entry.src);

            const isWebm = entry.src.toLowerCase().endsWith('.webm');

            if (isWebm) {
                const video = entry.img;
                const onReady = () => {
                    video.classList.add('loaded');
                    video.muted = true;
                    // Ne se met en lecture que si on est déjà dans la marge étroite
                    // (sinon elle reste chargée, prête, mais en pause sur sa 1ère image).
                    if (video.dataset.shouldPlay === 'true') {
                        video.play().catch(() => {});
                    }
                    video.removeEventListener('loadeddata', onReady);
                    if (onDone) onDone();
                };
                video.addEventListener('loadeddata', onReady);
                video.addEventListener('error', () => { if (onDone) onDone(); }, { once: true });
                video.src = entry.src;
                video.load();
                return;
            }

            const preloader = new Image();
            preloader.onload = () => {
                entry.img.src = entry.src;
                entry.img.classList.add('loaded');
                if (onDone) onDone();
            };
            preloader.onerror = () => { entry.img.src = entry.src; if (onDone) onDone(); };
            preloader.src = entry.src;
        }

        // Décharge complètement un média (vide la source, force la libération
        // mémoire côté navigateur) et permet un rechargement futur si l'utilisateur revient.
        function unloadMedia(entry) {
            if (!startedSrcs.has(entry.src)) return; // jamais chargé : rien à faire
            const el = entry.img;
            if (el.tagName === 'VIDEO') {
                el.pause();
                el.removeAttribute('src');
                el.load(); // force le navigateur à relâcher les ressources de décodage
                el.dataset.shouldPlay = 'false';
            } else {
                el.removeAttribute('src');
            }
            el.classList.remove('loaded');
            startedSrcs.delete(entry.src);
        }

        // --- Marge large (~200m) : charge / décharge selon la distance réelle à l'écran ---
        const METERS_UNLOAD_MARGIN = 200;
        const UNLOAD_MARGIN_PX = METERS_UNLOAD_MARGIN * PIXELS_PER_METER;

        const loadObserver = new IntersectionObserver((entries) => {
            entries.forEach((obs) => {
                const entry = depthImageQueue.find(e => e.card === obs.target);
                if (!entry) return;
                if (obs.isIntersecting) {
                    preloadAndSwap(entry, null);
                } else {
                    unloadMedia(entry);
                }
            });
        }, { rootMargin: `${UNLOAD_MARGIN_PX}px 0px ${UNLOAD_MARGIN_PX}px 0px` });

        // --- Marge étroite : contrôle la lecture/pause des vidéos uniquement ---
        const PLAY_MARGIN_PX = 400;

        const playObserver = new IntersectionObserver((entries) => {
            entries.forEach((obs) => {
                const entry = depthImageQueue.find(e => e.card === obs.target);
                if (!entry || entry.img.tagName !== 'VIDEO') return;
                const video = entry.img;
                if (obs.isIntersecting) {
                    video.dataset.shouldPlay = 'true';
                    if (video.readyState >= 2) video.play().catch(() => {});
                } else {
                    video.dataset.shouldPlay = 'false';
                    video.pause();
                }
            });
        }, { rootMargin: `${PLAY_MARGIN_PX}px 0px ${PLAY_MARGIN_PX}px 0px` });

        depthImageQueue.forEach(entry => {
            loadObserver.observe(entry.card);
            if (entry.img.tagName === 'VIDEO') playObserver.observe(entry.card);
        });

        // GENERATION DES PALIERS TEXTUELS DANS LES ABYSSES
        paliersInfo.forEach((palier) => {
            const block = document.createElement('div');
            block.className = 'depth-milestone';

            const milestoneTop = (palier.profondeur * PIXELS_PER_METER); // CORRIGÉ : Plus de double décalage de surface
            block.style.top = `${milestoneTop}px`;

            block.innerHTML = `
                <div class="milestone-title">${palier.titre}</div>
                <div class="milestone-desc">${palier.description}</div>
            `;
            milestonesGroup.appendChild(block);
        });

        // ============================================================
        // 5. REGLE VERTICALE DE PROFONDEUR — génération du pool de graduations
        // ============================================================
        const depthRuler = document.getElementById('depth-ruler');
        const rulerTrack = document.getElementById('ruler-track');
        const RULER_POOL_SIZE = 240;  // Nombre de graduations gérées en permanence (recyclées) — règle pleine hauteur
        const RULER_MINOR_STEP = 2;   // Mètres entre 2 graduations mineures
        const RULER_MAJOR_EVERY = 5;  // 1 graduation majeure toutes les 5 (donc tous les 10m)
        const RULER_SCALE = 5;        // Pixels par mètre sur la règle
        const rulerTicks = [];

        for (let i = 0; i < RULER_POOL_SIZE; i++) {
            const tick = document.createElement('div');
            tick.className = 'ruler-tick';
            const label = document.createElement('span');
            label.className = 'ruler-label';
            tick.appendChild(label);
            rulerTrack.appendChild(tick);
            rulerTicks.push({ el: tick, labelEl: label });
        }

        function updateRuler(depth) {
            const halfCount = RULER_POOL_SIZE / 2;
            const baseIndex = Math.round(depth / RULER_MINOR_STEP);
            const windowHalf = (depthRuler.clientHeight || 300) / 2;

            for (let i = 0; i < RULER_POOL_SIZE; i++) {
                const tickIndex = baseIndex - halfCount + i;
                const tickDepth = tickIndex * RULER_MINOR_STEP;
                const entry = rulerTicks[i];

                if (tickDepth < 0) {
                    entry.el.style.opacity = 0;
                    continue;
                }

                const offset = (tickDepth - depth) * RULER_SCALE;
                entry.el.style.transform = `translateY(calc(-50% + ${offset}px))`;

                const isMajor = (tickIndex % RULER_MAJOR_EVERY === 0);
                entry.el.classList.toggle('major', isMajor);
                entry.labelEl.textContent = isMajor ? `${tickDepth}m` : '';

                const dist = Math.abs(offset);
                const fadeStart = windowHalf - 10;
                entry.el.style.opacity = dist > fadeStart ? Math.max(0, 1 - (dist - fadeStart) / 20) : 1;
            }
        }
        updateRuler(0);

        // --- ENGIN DE PILOTAGE DU SOUS-MARIN ENCAPSULÉ DANS LE VIEWPORT & PROGRESSION DE SCROLL ---
        const subPilot = document.getElementById('sub-pilot-container');
        const subImage = document.querySelector('.sub-image');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        // Le défilement automatique au survol n'a de sens que sur un vrai écran + souris.
        // Sur tactile, la position "mouseY" reste figée après le dernier toucher, ce qui
        // provoquait un scroll qui ne s'arrêtait plus une fois lâché.
        const hasHoverMouse = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
        let isAudioUnlocked = false;
        let isMediaOpen = false; // Suspend le scroll piloté par la souris tant qu'une popup média est ouverte
        let currentDepthGlobal = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            subPilot.style.left = `${mouseX}px`;
            subPilot.style.top = `${mouseY}px`;

            const isMobile = window.innerWidth <= 768;
            const subWidth = isMobile ? 135 : 210;
            const subHeight = isMobile ? 75 : 120;
            const offsetLeft = isMobile ? 15 : 25;
            const offsetTop = isMobile ? 15 : 20;

            let targetSubLeft = mouseX + offsetLeft;
            let targetSubTop = mouseY + offsetTop;

            if (targetSubLeft < 0) targetSubLeft = 0;
            if (targetSubLeft > window.innerWidth - subWidth) targetSubLeft = window.innerWidth - subWidth;
            if (targetSubTop < 0) targetSubTop = 0;
            if (targetSubTop > window.innerHeight - subHeight) targetSubTop = window.innerHeight - subHeight;

            subImage.style.left = `${targetSubLeft - mouseX}px`;
            subImage.style.top = `${targetSubTop - mouseY}px`;

            if(!isAudioUnlocked) { unlockAudio(); }
        });

        // Point 4 : accumulateur de temps pour la chute continue de la neige marine
        let snowTimeOffset = 0;
        const snowLayerBack = document.getElementById('snow-back');
        const snowLayerMid = document.getElementById('snow-mid');
        const snowLayerFront = document.getElementById('snow-front');

        function updateProgressiveScroll() {
            const viewHeight = window.innerHeight;
            const activationZone = 130;
            const maxScrollSpeed = 55;

            if (!isMediaOpen && hasHoverMouse) {
                if (mouseY > viewHeight - activationZone) {
                    const delta = mouseY - (viewHeight - activationZone);
                    const intensity = Math.pow(delta / activationZone, 2);
                    window.scrollBy(0, intensity * maxScrollSpeed);
                }
                else if (mouseY < activationZone && window.scrollY > 0) {
                    const delta = activationZone - mouseY;
                    const intensity = Math.pow(delta / activationZone, 2);
                    window.scrollBy(0, -intensity * maxScrollSpeed);
                }
            }

            // Neige marine sur 3 plans : le premier plan bouge plus vite que le second,
            // et le second plus vite que le troisième (parallaxe de profondeur).
            snowTimeOffset += 1;
            const snowIntensity = Math.max(0, Math.min(1, (currentDepthGlobal - 1000) / 150));
            if (snowIntensity > 0) {
                const sY = window.scrollY;
                snowLayerBack.style.opacity = (snowIntensity * 0.5).toFixed(2);
                snowLayerMid.style.opacity = (snowIntensity * 0.75).toFixed(2);
                snowLayerFront.style.opacity = snowIntensity.toFixed(2);

                // Signe inversé : le sous-marin descend plus vite que la neige ne coule,
                // donc relativement à la caméra, la neige semble REMONTER quand on descend
                // (et inversement quand on remonte) — comme sur neal.fun/deep-sea.
                snowLayerBack.style.backgroundPosition  = `0px ${(-sY * 0.05 + snowTimeOffset * 0.15).toFixed(1)}px`;
                snowLayerMid.style.backgroundPosition   = `0px ${(-sY * 0.12 + snowTimeOffset * 0.30).toFixed(1)}px`;
                snowLayerFront.style.backgroundPosition = `0px ${(-sY * 0.22 + snowTimeOffset * 0.55).toFixed(1)}px`;
            } else {
                snowLayerBack.style.opacity = 0;
                snowLayerMid.style.opacity = 0;
                snowLayerFront.style.opacity = 0;
            }

            requestAnimationFrame(updateProgressiveScroll);
        }
        requestAnimationFrame(updateProgressiveScroll);

        // --- CONTROLE DU SYSTEME AUDIO ET DE LA CAPSULE DE VOLUMES ---
        const bgMusic = document.getElementById('bg-music');
        const volSlider = document.getElementById('vol-slider');
        const volFill = document.getElementById('vol-fill');
        const muteBtn = document.getElementById('mute-btn');
        let currentVolume = 0.6;
        let isMuted = false;

        function setVolume(volumeFactor) {
            currentVolume = Math.max(0, Math.min(1, volumeFactor));
            if(!isMuted) {
                bgMusic.volume = currentVolume;
            }
            volFill.style.height = `${currentVolume * 100}%`;
        }
        setVolume(currentVolume);

        function handleVolumeDrag(e) {
            const rect = volSlider.getBoundingClientRect();
            const clickYFromBottom = rect.bottom - e.clientY;
            const newVol = clickYFromBottom / rect.height;
            if(isMuted) toggleMute();
            setVolume(newVol);
        }

        let isDraggingVol = false;
        volSlider.addEventListener('mousedown', (e) => {
            isDraggingVol = true;
            handleVolumeDrag(e);
        });
        window.addEventListener('mousemove', (e) => {
            if(isDraggingVol) handleVolumeDrag(e);
        });
        window.addEventListener('mouseup', () => { isDraggingVol = false; });

        function toggleMute() {
            isMuted = !isMuted;
            if (isMuted) {
                bgMusic.volume = 0;
                muteBtn.style.color = '#ef4444';
                volFill.style.opacity = '0.3';
            } else {
                bgMusic.volume = currentVolume;
                muteBtn.style.color = '#94a3b8';
                volFill.style.opacity = '1';
            }
        }
        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMute();
        });

        function unlockAudio() {
            isAudioUnlocked = true;
            bgMusic.play().catch(() => {
                isAudioUnlocked = false;
            });
        }
        window.addEventListener('click', () => { if(!isAudioUnlocked) unlockAudio(); });

        // Point 7 : nuage de sédiments — déclenché une seule fois au contact du fond
        const sedimentCloud = document.getElementById('sediment-cloud');
        let sedimentTriggered = false;

        function checkSedimentTrigger() {
            if (sedimentTriggered) return;
            const rect = floorElement.getBoundingClientRect();
            if (rect.top < window.innerHeight * 0.75) {
                sedimentTriggered = true;
                sedimentCloud.classList.add('active');
            }
        }

        // --- SCROLL LISTENER POUR L'UI ---
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const surfaceHeight = HERO_PIXEL_HEIGHT;

            if (scrollTop > surfaceHeight * 0.1) {
                document.body.classList.add('submerged');
            } else {
                document.body.classList.remove('submerged');
            }

            // Référence = position de la flèche fixe de la règle (centre vertical de l'écran),
            // alignée sur le début visuel réel de l'eau (la fine bande de 130px), pas sur
            // le bas de toute la scène orange (qui contient surtout du ciel).
            const lineOffset = window.innerHeight / 2;
            const WATER_VISUAL_START = surfaceHeight - 130;

            let currentDepth = 0;
            if (scrollTop + lineOffset > WATER_VISUAL_START) {
                currentDepth = Math.floor((scrollTop + lineOffset - WATER_VISUAL_START) / PIXELS_PER_METER);
            }
            if (currentDepth > MAX_DEPTH) currentDepth = MAX_DEPTH;
            currentDepthGlobal = currentDepth;

            updateRuler(currentDepth);

            if (currentDepth < 200) {
                zoneTxt.textContent = "Zone Épipélagique (0m - 200m)";
            } else if (currentDepth < 1000) {
                zoneTxt.textContent = "Zone Mésopélagique (200m - 1000m)";
            } else if (currentDepth < 4000) {
                zoneTxt.textContent = "Zone Bathypélagique (1000m - 4000m)";
            } else if (currentDepth < 6000) {
                zoneTxt.textContent = "Zone Abyssopélagique (4000m - 6000m)";
            } else {
                zoneTxt.textContent = "Zone Hadopélagique (6000m - Fosse)";
            }

            checkSedimentTrigger();
        });

        function spawnContinuousBubbles() {
            setInterval(() => {
                if (window.scrollY > window.innerHeight * 0.3 && currentDepthGlobal < 1000) {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    const size = Math.random() * 6 + 3;
                    const leftPos = Math.random() * window.innerWidth;
                    bubble.style.width = `${size}px`;
                    bubble.style.height = `${size}px`;
                    bubble.style.left = `${leftPos}px`;
                    const duration = Math.random() * 3 + 4;
                    bubble.style.animationDuration = `${duration}s`;
                    document.body.appendChild(bubble);
                    setTimeout(() => { bubble.remove(); }, duration * 1000);
                }
            }, 250);
        }
        spawnContinuousBubbles();

        // Point 6 : bioluminescence aléatoire, discrète, à partir de la zone mésopélagique (200m)
        function spawnBiolumDot() {
            const colors = ['#38bdf8', '#fb7185', '#4ade80']; // bleu, rouge, vert
            const color = colors[Math.floor(Math.random() * colors.length)];
            const dot = document.createElement('div');
            dot.className = 'biolum-dot';
            const size = Math.random() * 4 + 3;
            dot.style.width = `${size}px`;
            dot.style.height = `${size}px`;
            dot.style.left = `${Math.random() * 96 + 2}vw`;
            dot.style.top = `${Math.random() * 90 + 5}vh`;
            dot.style.background = color;
            dot.style.boxShadow = `0 0 10px 3px ${color}`;
            document.body.appendChild(dot);
            setTimeout(() => dot.remove(), 1100);
        }

        function scheduleNextBiolum() {
            const delay = 500 + Math.random() * 2200; // apparitions espacées, avec parcimonie
            setTimeout(() => {
                if (currentDepthGlobal >= 200) spawnBiolumDot();
                scheduleNextBiolum();
            }, delay);
        }
        scheduleNextBiolum();

        const popup = document.getElementById('media-popup');
        const popupBox = document.getElementById('popup-box');
        const closeBtn = document.getElementById('close-btn');

        function openPopup(mediaPath) {
            const oldMedia = popupBox.querySelector('.inserted-media');
            if (oldMedia) oldMedia.remove();

            const isVideo = mediaPath.endsWith('.mp4') || mediaPath.endsWith('.webm');
            let mediaElement;

            if (isVideo) {
                mediaElement = document.createElement('video');
                mediaElement.src = mediaPath;
                mediaElement.autoplay = true;
                mediaElement.controls = true;
                mediaElement.className = 'inserted-media';
                mediaElement.onended = () => { closePopup(); };
            } else {
                mediaElement = document.createElement('img');
                mediaElement.src = mediaPath;
                mediaElement.className = 'inserted-media';
            }

            popupBox.insertBefore(mediaElement, closeBtn);
            popup.classList.add('active');
            isMediaOpen = true;
        }

        function closePopup() {
            popup.classList.remove('active');
            isMediaOpen = false;
            setTimeout(() => {
                const media = popupBox.querySelector('.inserted-media');
                if (media) media.remove();
            }, 300);
        }

        closeBtn.addEventListener('click', closePopup);
        popup.addEventListener('click', closePopup);
        popupBox.addEventListener('click', (e) => {
            if(e.target !== closeBtn && !e.target.hasAttribute('controls')) {
                closePopup();
            } else {
                e.stopPropagation();
            }
        });
    </script>
</body>
</html>
