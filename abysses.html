<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plongée dans les Abysses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* --- STYLES GENERAUX --- */
        :root {
            --font-title: 'Cinzel', serif;
            --font-body: 'Montserrat', sans-serif;
            --font-signature: 'Great Vibes', cursive;
            --color-sea-top: #0284c7;

            /* Palette "golden hour" de la scène de surface (zone orange) */
            --sky-1: #fff6e6;
            --sky-2: #ffdb9e;
            --sky-3: #ff9f68;
            --sky-4: #f9704f;
        }

        html {
            overflow-x: hidden;
            width: 100%;
            /* La "barre grise" tout à droite de l'écran est la barre de défilement
               native du navigateur (confirmé par analyse des pixels : gris uniforme,
               pleine hauteur, à l'emplacement exact d'une scrollbar). Comme la page a
               déjà sa propre règle de profondeur comme repère visuel de position, on la
               masque pour un rendu plus soigné — le défilement (molette, trackpad,
               tactile, clavier) continue de fonctionner normalement, seule la barre
               visuelle disparaît. */
            scrollbar-width: none; /* Firefox */
        }
        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Edge */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* On cache le curseur par défaut pour le remplacer par le combo sous-marin + viseur */
            cursor: none !important;
        }

        body {
            font-family: var(--font-body);
            color: #ffffff;
            /* CORRECTIF BUG (scroll bloqué sur Firefox desktop) : cette règle avait
               autrefois "overflow-x: hidden;" en plus de celle déjà posée sur <html>
               juste au-dessus. Avec les deux à la fois, le navigateur considère <html>
               ET <body> comme deux conteneurs défilants indépendants (chacun avec une
               hauteur de contenu supérieure à sa propre hauteur visible) — <html> suffit
               largement à lui seul pour rogner tout débordement horizontal de la page
               entière, y compris celui de <body>. Reproduit et confirmé : avec les deux
               réglages simultanés, le défilement à la molette ne fonctionne plus dans au
               moins un moteur de rendu ; avec un seul des deux (sur <html>), tout
               fonctionne normalement, dans tous les navigateurs testés. */
            /* Fond de repli en noir : lors d'un scroll très rapide, le navigateur peut
               mettre un instant à peindre le grand dégradé .ocean-light-glow dans les
               zones qui viennent d'apparaître, et c'est ce fond qui se voit brièvement.
               Le noir reste le choix le plus sûr car il correspond à la couleur réelle
               de la majorité de la page (le noir commence dès 4000m, soit ~58% de la
               hauteur totale) — un bref flash y est donc invisible. Un essai en bleu de
               surface a été fait puis écarté : il rendait le flash bien plus visible et
               plus fréquent dans les abysses, qui occupent la majorité du parcours. */
            background-color: #000000;
            height: 50000px; /* Ajusté dynamiquement par le JS */
        }

        /* ============================================================
           1. ZONE DE SURFACE (« ZONE ORANGE ») — CIEL, ÎLE, SOUS-MARIN
           ============================================================ */
        .surface {
            height: 100vh;
            position: relative;
            overflow: hidden;
            z-index: 10;
            color: #0f172a;
            /* OPTIM CPU : une fois qu'on a scrollé plus bas, cette section (ciel dégradé,
               nuages flous animés, vagues SVG) sort de l'écran mais continuait à être
               peinte à chaque frame. content-visibility:auto dit au navigateur de sauter
               entièrement le style/layout/paint de cette section tant qu'elle n'est pas
               visible, sans changer son apparence quand on la revoit. */
            content-visibility: auto;
            contain-intrinsic-size: 100% 100vh;
        }

        .surface-sky {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                var(--sky-1) 0%,
                var(--sky-2) 30%,
                var(--sky-3) 54%,
                var(--sky-4) 70%,
                #2f6d7a 100%);
            z-index: 1;
        }

        .sun-glow {
            position: absolute;
            top: 13%;
            left: 64%;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,214,150,0.55) 38%, transparent 72%);
            filter: blur(2px);
            animation: sunPulse 6s ease-in-out infinite;
        }
        @keyframes sunPulse {
            0%, 100% { opacity: 0.92; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.07); }
        }

        .cloud {
            position: absolute;
            background: rgba(255,255,255,0.6);
            border-radius: 50px;
            filter: blur(2px);
            animation: driftCloud linear infinite;
            z-index: 2;
        }
        .cloud-1 { width: 170px; height: 34px; top: 9%;  left: -15%; animation-duration: 75s; }
        .cloud-2 { width: 110px; height: 24px; top: 21%; left: 35%;  animation-duration: 95s; opacity: 0.45; }
        .cloud-3 { width: 140px; height: 28px; top: 6%;  left: 65%;  animation-duration: 85s; opacity: 0.55; }
        @keyframes driftCloud {
            0%   { transform: translateX(0); }
            100% { transform: translateX(140vw); }
        }

        .horizon-haze {
            position: absolute;
            left: 0;
            width: 100%;
            bottom: 130px;
            height: 90px;
            background: linear-gradient(180deg, transparent, rgba(255,159,104,0.32) 45%, rgba(26,111,131,0.5) 100%);
            filter: blur(7px);
            z-index: 2;
            pointer-events: none;
        }

        /* --- Texte du titre (point 2 : signature en calligraphie sous le titre) --- */
        .surface-text {
            position: absolute;
            top: 13%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 700px;
            text-align: center;
            z-index: 6;
        }
        .surface-text h1 {
            font-family: var(--font-title);
            font-size: 3.5rem;
            letter-spacing: 4px;
            margin-bottom: 6px;
            text-shadow: 0 2px 18px rgba(255,255,255,0.35);
        }
        .surface-signature {
            font-family: var(--font-signature);
            font-size: 1.9rem;
            font-weight: 400;
            margin-bottom: 22px;
            opacity: 0.85;
            letter-spacing: 1px;
        }
        .surface-subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.75;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .surface-ocean {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 130px;
            overflow: hidden;
            z-index: 4;
            background: var(--color-sea-top);
        }
        /* Vagues animées de la zone de surface (surface-ocean) — remontées pour couvrir
           toute la hauteur de la section et supprimer la bande plate "morte" au-dessus */
        .wave {
            position: absolute;
            left: 0;
            width: 200%;
            height: 90px;
            animation: waveScroll linear infinite;
        }
        @keyframes waveScroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .surface-ocean .wave-back  { top: 0px; opacity: 0.6;  animation-duration: 24s; }
        .surface-ocean .wave-mid   { top: 4px; opacity: 0.85; animation-duration: 17s; }
        .surface-ocean .wave-front { top: 8px; opacity: 1;    animation-duration: 12s; }

        /* --- DEGRADE DE LUMIERE --- */
        /* Dégradé de profondeur découpé en plusieurs segments (au lieu d'un bloc unique de
           12000px) : certains moteurs de rendu mobiles affichent des artefacts (bandes noires)
           sur les très grands éléments dégradés d'un seul tenant. Le rendu visuel est identique. */
        .ocean-light-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* Hauteur posée dynamiquement en JS (dépend de l'échelle de profondeur) */
            pointer-events: none;
            z-index: 1;
        }
        .ocean-light-glow .glow-segment {
            position: absolute;
            left: 0;
            width: 100%;
            height: 3000px;
        }
        /* CORRECTIF : les segments n'ont plus de top/height fixes en px ici — ils sont
           calculés dynamiquement en JS à partir de la profondeur réelle (depthToPx),
           pour rester alignés sur les vraies zones océaniques (200m / 1000m / 4000m)
           quelle que soit l'échelle de dilatation de la zone épipélagique. Avant ce
           correctif, ces segments gardaient des positions fixes en pixels alors que la
           dilatation de la zone épipélagique a été appliquée par-dessus : résultat, le
           noir complet (censé arriver vers 850m) était atteint dès ~140m de profondeur
           réelle — d'où l'impression que "la nuit tombe trop vite". */
        .glow-segment-1 { background: linear-gradient(to bottom, var(--color-sea-top) 0%, #0c356a 80%, #0a305f 100%); }
        .glow-segment-2 { background: linear-gradient(to bottom, #0a305f 0%, #011627 100%); }
        .glow-segment-3 { background: linear-gradient(to bottom, #011627 0%, #010b14 100%); }
        .glow-segment-4 { background: linear-gradient(to bottom, #010b14 0%, #000000 100%); }

        /* ============================================================
           4. NEIGE MARINE SUR 3 PLANS DE PROFONDEUR (PARALLAXE)
           ============================================================ */
        /* OPTIM CPU : auparavant, le mouvement de la neige était obtenu en modifiant
           background-position sur un calque plein écran — une propriété qui force un
           repaint complet à chaque mise à jour (contrairement à transform, qui reste
           sur le compositeur GPU). Nouvelle structure : .snow-layer devient une simple
           "fenêtre" de recadrage plein écran (overflow:hidden), et .snow-layer-fill
           (le calque qui porte réellement le motif) est surdimensionné d'une largeur de
           motif de chaque côté, puis déplacé via transform. Comme il déborde toujours
           d'au moins un motif complet par rapport à la fenêtre, il n'y a jamais de bord
           vide visible, quelle que soit la valeur de décalage. Rendu final identique au
           pixel près, juste une technique de déplacement moins coûteuse. */
        .snow-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            z-index: 3;
            overflow: hidden;
        }
        .snow-layer-fill {
            position: absolute;
            left: 0;
            width: 100%;
            background-repeat: repeat;
            will-change: transform;
        }
        .snow-layer-back .snow-layer-fill {
            top: -320px;
            height: calc(100% + 640px);
            background-size: 320px 320px;
            background-image:
                radial-gradient(1px 1px at 30px 40px, rgba(220,230,240,0.5), transparent),
                radial-gradient(1px 1px at 140px 200px, rgba(220,230,240,0.4), transparent),
                radial-gradient(1px 1px at 230px 90px, rgba(220,230,240,0.45), transparent);
        }
        .snow-layer-mid .snow-layer-fill {
            top: -360px;
            height: calc(100% + 720px);
            background-size: 360px 360px;
            background-image:
                radial-gradient(1.5px 1.5px at 50px 70px, rgba(230,240,245,0.55), transparent),
                radial-gradient(1.4px 1.4px at 180px 240px, rgba(230,240,245,0.45), transparent),
                radial-gradient(1.5px 1.5px at 280px 120px, rgba(230,240,245,0.5), transparent);
        }
        .snow-layer-front .snow-layer-fill {
            top: -400px;
            height: calc(100% + 800px);
            background-size: 400px 400px;
            background-image:
                radial-gradient(2.2px 2.2px at 60px 80px, rgba(240,248,250,0.75), transparent),
                radial-gradient(2px 2px at 220px 260px, rgba(240,248,250,0.6), transparent),
                radial-gradient(2.2px 2.2px at 330px 140px, rgba(240,248,250,0.7), transparent),
                radial-gradient(2px 2px at 150px 340px, rgba(240,248,250,0.55), transparent);
        }

        /* --- BIOLUMINESCENCE ALEATOIRE (point 6) --- */
        .biolum-dot {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            animation: biolumFlash 1s ease-in-out forwards;
            will-change: transform, opacity;
        }
        @keyframes biolumFlash {
            0%   { opacity: 0; transform: scale(0.3); }
            30%  { opacity: 1; transform: scale(1); }
            70%  { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        /* --- SOUS-MARIN ET CURSEUR EXTENSION --- */
        #sub-pilot-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 210px;  /* Taille X1.5 globale */
            height: 120px;
            pointer-events: none; /* Laisse passer les clics à travers le container */
            z-index: 100;
            /* OPTIM CPU : déplacé via transform (JS) plutôt que left/top ; will-change
               garde ce petit élément sur sa propre couche GPU en continu. */
            will-change: transform;
        }

        .sub-image {
            position: absolute;
            /* OPTIM CPU : positionnement géré uniquement via transform (voir JS) au lieu
               de left/top, pour rester sur le compositeur GPU et éviter un reflow à
               chaque mouvement de souris. left/top restent à 0 et servent de repère fixe. */
            left: 0;
            top: 0;
            width: 210px; /* Agrandissement X1.5 de l'image du sous-marin */
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
            will-change: transform;
        }

        /* Le point de clic précis (Viseur) placé au-dessus et à gauche du sous-marin */
        .sub-crosshair {
            position: absolute;
            left: 0;
            top: 0;
            transform: translate(-50%, -50%); /* Centrage parfait et absolu sur la pointe réelle de la souris */
            width: 12px;
            height: 12px;
            background-color: #2dd4bf;
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 12px #2dd4bf;
        }

        /* --- CONTROLEUR AUDIO DESIGN ALIGNÉ ET PLACÉ EN HAUT --- */
        .audio-control-panel {
            position: fixed;
            left: 30px;
            top: 40px; /* Placé le plus haut possible sur la page */
            width: 40px; /* Même largeur pour un alignement parfait sur l'axe */
            z-index: 90;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .volume-pill-container {
            width: 24px;
            height: 130px;
            background-color: #141619;
            border: 1px solid #22252a;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8), 0 4px 12px rgba(0,0,0,0.5);
        }

        .volume-track-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%; /* Géré par le JS */
            background: linear-gradient(to top, #005f73, #0a9396, #2dd4bf); /* Dégradé nuances bleu turquoise */
            box-shadow: 0 0 12px rgba(45, 212, 191, 0.4);
            transition: height 0.05s linear;
        }

        .audio-btn {
            background: none;
            border: none;
            outline: none;
            color: #94a3b8;
            transition: color 0.2s, transform 0.2s;
        }
        .audio-btn:hover { color: #2dd4bf; transform: scale(1.1); }
        .audio-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* --- INTERFACE TEXTUELLE FIXE (UI) --- */
        /* ============================================================
           REGLE VERTICALE DE PROFONDEUR (remplace la ligne pointillée
           ET l'ancien compteur numérique). Fond transparent (point 4),
           occupe toute la hauteur de la page (point 2).
           Flèche blanche statique + échelle qui défile en fonction du scroll
           ============================================================ */
        .depth-ruler {
            position: fixed;
            right: 34px;
            top: 24px;
            bottom: 24px;
            width: 74px;
            z-index: 80;
            display: flex;
            align-items: center;
            background: transparent;
            opacity: 0;
            transition: opacity 0.5s;
        }
        body.submerged .depth-ruler { opacity: 1; }

        .ruler-window {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .ruler-track {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }
        .ruler-tick {
            position: absolute;
            left: 10px;
            top: 50%;
            width: 14px;
            height: 1px;
            background: rgba(255,255,255,0.5);
        }
        .ruler-tick.major {
            width: 22px;
            height: 2px;
            background: #ffffff;
        }
        .ruler-label {
            position: absolute;
            left: 26px;
            top: -7px;
            font-size: 0.68rem;
            color: #ffffff;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
            opacity: .9;
        }
        .ruler-arrow {
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-left: 10px solid #ffffff;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.85));
            z-index: 2;
        }

        .zone-indicator {
            position: fixed;
            left: 30px;
            bottom: 40px;
            width: 40px; /* Même largeur pour un alignement d'axe parfait avec le panel audio */
            display: flex;
            justify-content: center;
            align-items: center;
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            opacity: 0;
            z-index: 80;
            font-weight: 600;
            transition: opacity 0.5s;
        }
        body.submerged .zone-indicator { opacity: 0.4; }

        /* --- PALIERS DE DESCRIPTION TEXTUELS (STYLE NEAL.FUN) --- */
        .depth-milestone {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 700px;
            text-align: center;
            z-index: 4;
            pointer-events: none;
        }

        .milestone-title {
            font-family: var(--font-title);
            font-size: 2rem;
            letter-spacing: 2px;
            color: #38bdf8;
            margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .milestone-desc {
            font-family: var(--font-body);
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            opacity: 0.75;
            color: #f1f5f9;
        }

        /* --- ANIMAUX --- */
        .abyss-container {
            position: relative;
            width: 100%;
            height: calc(100% - 100vh);
        }

        .animal-card {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 6;
            /* CORRECTIF : content-visibility n'est plus posé ici (voir .animal-visual
               plus bas). Posé directement sur .animal-card, il applique un contain:paint
               implicite à TOUT le sous-arbre, y compris le tooltip d'anecdote positionné
               au-dessus de la carte (bottom:100%, donc hors de sa boîte) — il se
               retrouvait rogné/invisible. Idem pour le nom/nom latin/taille : dès que la
               carte était étroite (petits animaux, ex. tailleRelative:"7vw"), le texte qui
               dépassait cette largeur était tronqué au lieu de simplement passer à la
               ligne. En déplaçant content-visibility sur un wrapper interne qui ne
               contient QUE l'image/vidéo, le tooltip et le texte redeviennent des enfants
               directs de .animal-card (donc jamais rognés), tout en conservant le gain
               CPU là où il compte vraiment : le décodage/rendu de l'image ou de la vidéo. */
        }

        /* Wrapper interne : ne contient que l'image/vidéo, dimensionné par tailleRelative.
           C'est LUI qui porte le content-visibility (le gros du coût de rendu). */
        .animal-visual {
            content-visibility: auto;
            contain-intrinsic-size: 260px 260px;
            /* CORRECTIF : content-visibility applique un contain:paint implicite, qui
               rognait l'animation de nage (translateY jusqu'à -12px) et le halo au
               survol (drop-shadow flou 25px) dès qu'ils dépassaient la boîte exacte de
               l'image — d'où le radiolaire "coupé" en haut de son mouvement. On ajoute
               une marge de respiration interne (padding), compensée par une marge
               négative de même valeur pour ne PAS agrandir l'empreinte de la carte dans
               la mise en page (le texte/centrage restent identiques) : cela donne de
               l'espace à ces effets sans jamais les rogner. */
            box-sizing: content-box;
            /* padding/margin réels posés en inline par le JS (proportionnels à la
               taille de chaque animal — voir génération des cartes) ; ces valeurs
               ne servent que de repli si jamais l'inline venait à manquer. */
            padding: 40px;
            margin: -40px;
            /* CORRECTIF : masque estompant les bords carrés, déplacé ici (voir
               commentaire détaillé sur .animal-card img plus bas). Les arrêts sont
               calculés pour que le fondu commence APRÈS la zone de padding (donc après
               la photo elle-même ET la marge réservée au halo/à l'animation), et ne
               termine qu'au tout bord du wrapper — le halo a ainsi toute la place du
               padding pour s'estomper en douceur au lieu d'être coupé net. */
            mask-image: radial-gradient(circle, black 60%, transparent 92%);
            -webkit-mask-image: radial-gradient(circle, black 60%, transparent 92%);
        }

        .pos-gauche { left: 12%; }
        .pos-milieu-gauche { left: 28%; }
        .pos-milieu { left: 50%; transform: translateX(-50%); }
        .pos-milieu-droite { right: 28%; }
        .pos-droite { right: 12%; }

        /* Seule l'image de l'animal bouge : nom / nom latin / taille restent statiques */
        @keyframes swimAnimation {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(var(--img-scale, 1)); }
            50% { transform: translateY(-12px) rotate(1.2deg) scale(var(--img-scale, 1)); }
        }

        .animal-card img,
        .animal-card video {
            width: 100%; /* S'adapte à la taille du wrapper .animal-visual (configurée en JS) */
            height: auto;
            aspect-ratio: 1 / 1; /* Réserve une place approximative tant que le média charge */
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
            transition: filter 0.3s, opacity 0.6s ease;
            --img-scale: 1;
            animation: swimAnimation 6s ease-in-out infinite;
            background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%);
            /* CORRECTIF : le masque qui estompe les bords carrés (voir .animal-visual
               ci-dessus) a été déplacé sur le wrapper .animal-visual plutôt que posé ici.
               Raison : posé directement sur l'image, son bord à 100% correspondait à la
               boîte EXACTE de l'image — et rognait donc aussi le halo au survol
               (drop-shadow flou 25px), qui déborde justement de cette boîte. En le
               déplaçant sur le wrapper (qui a de la marge grâce au padding ci-dessus),
               le halo a la place de s'estomper progressivement au lieu d'être coupé net. */
        }
        /* Image et vidéo restent invisibles jusqu'au chargement réel, puis
           apparaissent en fondu — la marge de 200m laisse largement le temps
           à la première image de la vidéo d'arriver avant que l'utilisateur
           ne scrolle jusque-là, donc pas besoin de vignette séparée. */
        .animal-card img,
        .animal-card video {
            opacity: 0;
        }
        .animal-card img.loaded,
        .animal-card video.loaded {
            opacity: 1;
        }

        .animal-card:hover img,
        .animal-card:hover video {
            filter: drop-shadow(0 0 25px rgba(45, 212, 191, 0.6));
            --img-scale: 1.04;
        }

        /* CORRECTIF : largeur mini + max-width raisonnable pour que le nom d'un animal
           reste lisible (passe à la ligne proprement) même quand tailleRelative est très
           petit (ex. "7vw" pour une larve minuscule) — indépendamment de la taille de
           l'image, qui elle continue de suivre fidèlement tailleRelative. */
        .animal-name, .animal-latin, .animal-size {
            max-width: max(170px, 30vw);
            min-width: 90px;
        }
        .animal-name { font-size: 1.1rem; font-weight: 600; margin-top: 12px; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }
        .animal-latin { font-size: 0.85rem; font-style: italic; opacity: 0.6; margin-top: 2px; }
        .animal-size { font-size: 0.8rem; opacity: 0.4; margin-top: 2px; }

        /* Tooltip Anecdote */
        .animal-tooltip {
            position: absolute;
            bottom: 100%;
            background: rgba(9, 10, 11, 0.95);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            width: min(260px, 65vw);
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            color: #ffffff;
        }
        .animal-card:hover .animal-tooltip { opacity: 1; transform: translateY(-10px); }

        /* --- LE FOND DE LA FOSSE --- */
        .seabed {
            position: absolute;
            width: 100%;
            height: 500px;
            bottom: 0;
            left: 0;
            background: #000000;
            z-index: 8;
        }

        .seabed-rocks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #090a0c;
            clip-path: polygon(0% 45%, 9% 38%, 20% 48%, 31% 33%, 42% 46%, 50% 28%, 61% 42%, 73% 31%, 84% 49%, 93% 36%, 100% 44%, 100% 100%, 0% 100%);
        }

        .seabed-rocks-front {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111316;
            clip-path: polygon(0% 55%, 14% 63%, 28% 48%, 43% 58%, 55% 45%, 70% 62%, 82% 51%, 94% 59%, 100% 48%, 100% 100%, 0% 100%);
            opacity: 0.95;
        }

        .seabed-marker {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: var(--font-title);
            z-index: 10;
            width: 90%;
        }

        .seabed-marker h2 {
            font-size: 2.2rem;
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #38bdf8;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .seabed-marker p {
            font-family: var(--font-body);
            font-size: 0.95rem;
            opacity: 0.5;
        }

        /* ============================================================
           7. NUAGE DE SEDIMENTS AU FOND (déclenché une fois au contact du fond)
           ============================================================ */
        .sediment-cloud {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 55vh;
            pointer-events: none;
            z-index: 9;
            overflow: visible;
        }
        .sediment-particle {
            position: absolute;
            bottom: -20px;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(130,110,90,0.55), rgba(95,80,65,0.25) 55%, transparent 75%);
            filter: blur(7px);
            opacity: 0;
        }
        .sediment-cloud.active .sediment-particle {
            animation: sedimentRise 12s ease-out forwards;
        }
        .sediment-particle.p1 { left: 4%;  width: 260px; height: 160px; animation-delay: 0s; }
        .sediment-particle.p2 { left: 18%; width: 190px; height: 120px; animation-delay: .15s; }
        .sediment-particle.p3 { left: 33%; width: 300px; height: 175px; animation-delay: .05s; }
        .sediment-particle.p4 { left: 50%; width: 210px; height: 130px; animation-delay: .25s; }
        .sediment-particle.p5 { left: 65%; width: 270px; height: 160px; animation-delay: .1s; }
        .sediment-particle.p6 { left: 80%; width: 200px; height: 125px; animation-delay: .3s; }
        .sediment-particle.p7 { left: 42%; width: 340px; height: 195px; animation-delay: 0s; }
        .sediment-particle.p8 { left: 92%; width: 170px; height: 105px; animation-delay: .2s; }
        .sediment-particle.p9 { left: 10%;  width: 155px; height: 100px; animation-delay: .35s; }

        @keyframes sedimentRise {
            0%   { opacity: 0;    transform: translateY(0) scale(0.8); }
            10%  { opacity: 0.95; transform: translateY(-140px) scale(1.1); }
            30%  { opacity: 0.9;  transform: translateY(-240px) scale(1.35); }
            60%  { opacity: 0.6;  transform: translateY(-160px) scale(1.2); }
            100% { opacity: 0;    transform: translateY(0px) scale(0.9); }
        }

        /* --- BULLES --- */
        .bubble {
            position: fixed;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            bottom: -60px;
            /* OPTIM CPU : itération unique (au lieu de "infinite") afin que l'évènement
               'animationend' se déclenche réellement — c'est ce qui permet de recycler
               l'élément dans le pool sans timer JS dédié. Le rendu est identique : dans
               l'ancienne version, la bulle était de toute façon détruite par un
               setTimeout juste après un seul cycle. */
            animation: floatUp linear 1;
            will-change: transform, opacity;
            /* OPTIM CPU : ces éléments sont désormais recyclés depuis un pool fixe
               (voir JS) plutôt que créés/détruits en continu. Masquées par défaut. */
            display: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-110vh) translateX(35px); opacity: 0; }
        }

        /* --- POPUP MEDIAS (CURSEUR RESTAURÉ) --- */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* Force la réapparition du curseur de la souris à l'ouverture d'une popup/anecdote */
        .popup-overlay.active, .popup-overlay.active * {
            cursor: default !important;
        }
        .popup-overlay.active .popup-close, .popup-overlay.active button, .popup-overlay.active video {
            cursor: pointer !important;
        }

        .popup-overlay.active { opacity: 1; pointer-events: auto; }
        .popup-content { position: relative; max-width: 85vw; max-height: 85vh; transform: scale(0.9); transition: transform 0.3s ease; }
        .popup-overlay.active .popup-content { transform: scale(1); }
        .popup-content img, .popup-content video { max-width: 100%; max-height: 85vh; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .popup-close { position: absolute; top: -40px; right: 0; background: none; border: none; color: white; font-size: 2rem; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .surface-text { top: 10%; }
            .surface-text h1 { font-size: 2.2rem; }
            .surface-signature { font-size: 1.3rem; margin-bottom: 14px; }
            .sun-glow { width: 85px; height: 85px; left: 58%; top: 10%; }
            .depth-ruler { right: 14px; width: 56px; top: 14px; bottom: 14px; }
            .ruler-label { font-size: 0.6rem; left: 24px; }
            .zone-indicator { left: 15px; width: 40px; font-size: 0.75rem; bottom: 30px; }
            .audio-control-panel { left: 15px; width: 40px; top: 20px; bottom: auto; }
            .seabed-marker h2 { font-size: 1.5rem; }
            #sub-pilot-container { width: 135px; height: 75px; }
            .sub-image { width: 135px; }
        }
    </style>
</head>

        // ============================================================
        const PPM_NORMAL = 14;            // px par mètre au-delà de 200m (inchangé)
        const EPI_DILATION_FACTOR = 6;    // x6 : palier "encore plus prononcé" demandé (précédemment x3)

            return EPI_DEPTH_LIMIT + (px - EPI_PX_HEIGHT) / PPM_NORMAL;

        // ci-dessus), donc .play() démarre quasi instantanément — ce n'est pas un délai
        // de chargement qu'on raccourcit, juste la fenêtre de lecture "en avance". 200px
        // laisse encore une marge confortable (environ un quart d'écran) pour que la
        // vidéo soit déjà en mouvement au moment où elle devient visible, sans à-coup.
        const PLAY_MARGIN_PX = 200;

        const playObserver = new IntersectionObserver((entries) => {
            entries.forEach((obs) => {
                const entry = depthImageQueueByCard.get(obs.target);
                if (!entry || entry.img.tagName !== 'VIDEO') return;
                const video = entry.img;
                if (obs.isIntersecting) {
                    video.dataset.shouldPlay = 'true';
                    // OPTIM CPU (point 5) : si une popup mediaClick est ouverte, on ne
                    // lance pas de nouvelle vidéo d'arrière-plan — le drapeau shouldPlay
                    // reste posé, et resumeBackgroundVideos() (appelée à la fermeture de
                    // la popup) s'en chargera à ce moment-là.
                    if (!isMediaOpen && video.readyState >= 2) video.play().catch(() => {});
                } else {
                    video.dataset.shouldPlay = 'false';
                    video.pause();
                }
            });
        }, { rootMargin: `${PLAY_MARGIN_PX}px 0px ${PLAY_MARGIN_PX}px 0px` });

        depthImageQueue.forEach(entry => {
            loadObserver.observe(entry.card);
            if (entry.img.tagName === 'VIDEO') playObserver.observe(entry.card);
        });

        // GENERATION DES PALIERS TEXTUELS DANS LES ABYSSES
        paliersInfo.forEach((palier) => {
            const block = document.createElement('div');
            block.className = 'depth-milestone';

            const milestoneTop = depthToPx(palier.profondeur); // échelle non-uniforme (zone épipélagique dilatée)
            block.style.top = `${milestoneTop}px`;

            block.innerHTML = `
                <div class="milestone-title">${palier.titre}</div>
                <div class="milestone-desc">${palier.description}</div>
            `;
            milestonesGroup.appendChild(block);
        });

        // ============================================================
        // 5. REGLE VERTICALE DE PROFONDEUR — génération du pool de graduations
        // ============================================================
        const depthRuler = document.getElementById('depth-ruler');
        const rulerTrack = document.getElementById('ruler-track');
        const RULER_POOL_SIZE = 240;  // Nombre de graduations gérées en permanence (recyclées) — règle pleine hauteur
        const RULER_MINOR_STEP = 2;   // Mètres entre 2 graduations mineures
        const RULER_MAJOR_EVERY = 5;  // 1 graduation majeure toutes les 5 (donc tous les 10m)
        const RULER_SCALE = 5;        // Pixels par mètre sur la règle
        const rulerTicks = [];

        for (let i = 0; i < RULER_POOL_SIZE; i++) {
            const tick = document.createElement('div');
            tick.className = 'ruler-tick';
            const label = document.createElement('span');
            label.className = 'ruler-label';
            tick.appendChild(label);
            rulerTrack.appendChild(tick);
            rulerTicks.push({ el: tick, labelEl: label });
        }

        function updateRuler(depth) {
            const halfCount = RULER_POOL_SIZE / 2;
            const baseIndex = Math.round(depth / RULER_MINOR_STEP);
            const windowHalf = (depthRuler.clientHeight || 300) / 2;
            const fadeStart = windowHalf - 10;
            const fadeEnd = fadeStart + 20; // au-delà, l'opacité est de toute façon clampée à 0

            for (let i = 0; i < RULER_POOL_SIZE; i++) {
                const tickIndex = baseIndex - halfCount + i;
                const tickDepth = tickIndex * RULER_MINOR_STEP;
                const entry = rulerTicks[i];

                if (tickDepth < 0) {
                    if (entry.lastOpacity !== 0) {
                        entry.el.style.opacity = 0;
                        entry.lastOpacity = 0;
                    }
                    continue;
                }

                const offset = (tickDepth - depth) * RULER_SCALE;
                const dist = Math.abs(offset);

                // OPTIM CPU : la grande majorité des 240 graduations se trouve hors de la
                // petite fenêtre visible de la règle à un instant donné (~40-50 visibles au
                // maximum). Au-delà de la zone de fondu, une graduation est garantie
                // invisible : inutile de recalculer sa position/son texte tant qu'elle le
                // reste — seul le passage visible ↔ invisible déclenche une écriture.
                if (dist > fadeEnd) {
                    if (entry.lastOpacity !== 0) {
                        entry.el.style.opacity = 0;
                        entry.lastOpacity = 0;
                    }
                    continue;
                }

                entry.el.style.transform = `translateY(calc(-50% + ${offset}px))`;

                const isMajor = (tickIndex % RULER_MAJOR_EVERY === 0);
                if (entry.lastMajor !== isMajor) {
                    entry.el.classList.toggle('major', isMajor);
                    entry.lastMajor = isMajor;
                }
                const labelText = isMajor ? `${tickDepth}m` : '';
                if (entry.lastLabel !== labelText) {
                    entry.labelEl.textContent = labelText;
                    entry.lastLabel = labelText;
                }

                const opacity = dist > fadeStart ? Math.max(0, 1 - (dist - fadeStart) / 20) : 1;
                if (entry.lastOpacity !== opacity) {
                    entry.el.style.opacity = opacity;
                    entry.lastOpacity = opacity;
                }
            }
        }
        updateRuler(0);

        // --- ENGIN DE PILOTAGE DU SOUS-MARIN ENCAPSULÉ DANS LE VIEWPORT ---
        const subPilot = document.getElementById('sub-pilot-container');
        const subImage = document.querySelector('.sub-image');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let isAudioUnlocked = false;
        let isMediaOpen = false; // bascule à l'ouverture/fermeture d'une popup média
        let currentDepthGlobal = 0;

        // OPTIM CPU : le mousemove peut se déclencher beaucoup plus souvent qu'une
        // frame d'affichage (souris haute fréquence). Le listener ne fait plus AUCUN
        // calcul ni écriture DOM : il se contente de mémoriser la position et de lever
        // un drapeau, consommé une seule fois par frame dans mainLoop() ci-dessous.
        let mouseDirty = false;
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            mouseDirty = true;
            if (!isAudioUnlocked) { unlockAudio(); }
        }, { passive: true });

        // Repositionne le sous-marin + son viseur. Utilise exclusivement `transform`
        // (translate3d) au lieu de left/top : ces écritures restent sur le compositeur
        // GPU et ne déclenchent plus de reflow à chaque déplacement de souris.
        function updateSubmarinePosition() {
            subPilot.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0)`;

            const isMobile = window.innerWidth <= 768;
            const subWidth = isMobile ? 135 : 210;
            const subHeight = isMobile ? 75 : 120;
            const offsetLeft = isMobile ? 15 : 25;
            const offsetTop = isMobile ? 15 : 20;

            let targetSubLeft = mouseX + offsetLeft;
            let targetSubTop = mouseY + offsetTop;

            if (targetSubLeft < 0) targetSubLeft = 0;
            if (targetSubLeft > window.innerWidth - subWidth) targetSubLeft = window.innerWidth - subWidth;
            if (targetSubTop < 0) targetSubTop = 0;
            if (targetSubTop > window.innerHeight - subHeight) targetSubTop = window.innerHeight - subHeight;

            subImage.style.transform = `translate3d(${targetSubLeft - mouseX}px, ${targetSubTop - mouseY}px, 0)`;
        }
        updateSubmarinePosition(); // position initiale, avant le premier mousemove

        // Point 4 : accumulateur de temps pour la chute continue de la neige marine
        let snowTimeOffset = 0;
        let snowCurrentlyVisible = false; // évite de réécrire opacity:0 en boucle une fois masquée
        const snowLayerBack = document.getElementById('snow-back');
        const snowLayerMid = document.getElementById('snow-mid');
        const snowLayerFront = document.getElementById('snow-front');
        const snowFillBack = document.getElementById('snow-back-fill');
        const snowFillMid = document.getElementById('snow-mid-fill');
        const snowFillFront = document.getElementById('snow-front-fill');
        // Ramène une valeur dans [0, tileSize) — la neige défile visuellement à l'identique
        // (le motif est répétitif) mais la valeur de transform reste bornée, ce qui garantit
        // que le calque surdimensionné (voir CSS) couvre toujours tout l'écran.
        const wrapTile = (v, t) => ((v % t) + t) % t;

        // ============================================================
        // BOUCLE PRINCIPALE UNIQUE — remplace l'ancien duo
        // "listener 'scroll'" + "boucle RAF indépendante".
        // Tout le travail par frame (position du sous-marin, profondeur,
        // règle, zone, sédiments, neige) est regroupé ici. Chaque étape
        // ne réécrit le DOM QUE si la valeur a réellement changé depuis
        // la frame précédente, ce qui évite l'essentiel des recalculs
        // de style/layout inutiles pendant un scroll rapide.
        // ============================================================
        let lastRenderedDepth = -1;
        let lastZoneLabel = '';
        let lastSubmerged = false;
        let snowFrameParity = 0; // ~30fps pour la neige au lieu de 60fps (mouvement lent, imperceptible)

        // OPTIM CPU (point 7) : coupe tout (boucle principale + vidéos en lecture) dès
        // que l'onglet n'est plus affiché — sinon le décodage vidéo et les recalculs de
        // style continuaient en arrière-plan, invisibles, pour rien. Tout reprend
        // exactement là où c'était resté dès le retour sur l'onglet.
        let rafRunning = true;
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                rafRunning = false; // mainLoop() ne se replanifie plus (voir sa fin)
                pauseBackgroundVideos(); // même fonction que pour les popups (point 5)
            } else {
                if (!rafRunning) {
                    rafRunning = true;
                    requestAnimationFrame(mainLoop);
                }
                if (!isMediaOpen) resumeBackgroundVideos(); // ne relance pas si une popup était ouverte entretemps
            }
        });

        function mainLoop() {
            // --- 1. Sous-marin (uniquement si la souris a bougé depuis la dernière frame) ---
            if (mouseDirty) {
                mouseDirty = false;
                updateSubmarinePosition();
            }

            // --- 2. Profondeur / règle / zone / sédiments, dérivés du scroll ---
            const scrollTop = window.scrollY;
            const surfaceHeight = HERO_PIXEL_HEIGHT;

            const submerged = scrollTop > surfaceHeight * 0.1;
            if (submerged !== lastSubmerged) {
                lastSubmerged = submerged;
                document.body.classList.toggle('submerged', submerged);
            }

            const lineOffset = window.innerHeight / 2;
            const WATER_VISUAL_START = surfaceHeight - 130;

            let currentDepth = 0;
            if (scrollTop + lineOffset > WATER_VISUAL_START) {
                currentDepth = Math.floor(pxToDepth(scrollTop + lineOffset - WATER_VISUAL_START));
            }
            if (currentDepth > MAX_DEPTH) currentDepth = MAX_DEPTH;
            currentDepthGlobal = currentDepth;

            if (currentDepth !== lastRenderedDepth) {
                lastRenderedDepth = currentDepth;
                updateRuler(currentDepth);

                let zoneLabel;
                if (currentDepth < 200) zoneLabel = "Zone Épipélagique (0m - 200m)";
                else if (currentDepth < 1000) zoneLabel = "Zone Mésopélagique (200m - 1000m)";
                else if (currentDepth < 4000) zoneLabel = "Zone Bathypélagique (1000m - 4000m)";
                else if (currentDepth < 6000) zoneLabel = "Zone Abyssopélagique (4000m - 6000m)";
                else zoneLabel = "Zone Hadopélagique (6000m - Fosse)";

                if (zoneLabel !== lastZoneLabel) {
                    lastZoneLabel = zoneLabel;
                    zoneTxt.textContent = zoneLabel;
                }

                checkSedimentTrigger();
            }

            // --- 3. Neige marine sur 3 plans (parallaxe), throttlée à ~30fps ---
            // Le premier plan bouge plus vite que le second, et le second plus vite
            // que le troisième. Le fondu d'opacité + le décalage de fond ne sont
            // recalculés qu'une frame sur deux : mouvement lent, la différence
            // visuelle avec 60fps est imperceptible, mais le coût de repaint est
            // divisé par deux.
            snowFrameParity ^= 1;
            if (snowFrameParity === 0) {
                snowTimeOffset += 2; // compense le fait qu'on ne joue qu'une frame sur deux
                const snowIntensity = Math.max(0, Math.min(1, (currentDepthGlobal - 1000) / 150));
                if (snowIntensity > 0) {
                    const sY = scrollTop;
                    snowLayerBack.style.opacity = (snowIntensity * 0.5).toFixed(2);
                    snowLayerMid.style.opacity = (snowIntensity * 0.75).toFixed(2);
                    snowLayerFront.style.opacity = snowIntensity.toFixed(2);

                    // Signe inversé : le sous-marin descend plus vite que la neige ne coule,
                    // donc relativement à la caméra, la neige semble REMONTER quand on descend
                    // (et inversement quand on remonte) — comme sur neal.fun/deep-sea.
                    // OPTIM CPU : transform au lieu de backgroundPosition — voir commentaire CSS.
                    snowFillBack.style.transform  = `translate3d(0, ${wrapTile(-sY * 0.05 + snowTimeOffset * 0.15, 320).toFixed(1)}px, 0)`;
                    snowFillMid.style.transform   = `translate3d(0, ${wrapTile(-sY * 0.12 + snowTimeOffset * 0.30, 360).toFixed(1)}px, 0)`;
                    snowFillFront.style.transform = `translate3d(0, ${wrapTile(-sY * 0.22 + snowTimeOffset * 0.55, 400).toFixed(1)}px, 0)`;
                    snowCurrentlyVisible = true;
                } else if (snowCurrentlyVisible) {
                    snowLayerBack.style.opacity = 0;
                    snowLayerMid.style.opacity = 0;
                    snowLayerFront.style.opacity = 0;
                    snowCurrentlyVisible = false;
                }
            }

            if (rafRunning) requestAnimationFrame(mainLoop);
        }
        requestAnimationFrame(mainLoop);

        // --- CONTROLE DU SYSTEME AUDIO ET DE LA CAPSULE DE VOLUMES ---
        const bgMusic = document.getElementById('bg-music');
        const volSlider = document.getElementById('vol-slider');
        const volFill = document.getElementById('vol-fill');
        const muteBtn = document.getElementById('mute-btn');
        let currentVolume = 0.6;
        let isMuted = false;

        function setVolume(volumeFactor) {
            currentVolume = Math.max(0, Math.min(1, volumeFactor));
            if(!isMuted) {
                bgMusic.volume = currentVolume;
            }
            volFill.style.height = `${currentVolume * 100}%`;
        }
        setVolume(currentVolume);

        function handleVolumeDrag(e) {
            const rect = volSlider.getBoundingClientRect();
            const clickYFromBottom = rect.bottom - e.clientY;
            const newVol = clickYFromBottom / rect.height;
            if(isMuted) toggleMute();
            setVolume(newVol);
        }

        let isDraggingVol = false;
        volSlider.addEventListener('mousedown', (e) => {
            isDraggingVol = true;
            handleVolumeDrag(e);
        });
        window.addEventListener('mousemove', (e) => {
            if(isDraggingVol) handleVolumeDrag(e);
        }, { passive: true });
        window.addEventListener('mouseup', () => { isDraggingVol = false; });

        function toggleMute() {
            isMuted = !isMuted;
            if (isMuted) {
                bgMusic.volume = 0;
                muteBtn.style.color = '#ef4444';
                volFill.style.opacity = '0.3';
            } else {
                bgMusic.volume = currentVolume;
                muteBtn.style.color = '#94a3b8';
                volFill.style.opacity = '1';
            }
        }
        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMute();
        });

        function unlockAudio() {
            isAudioUnlocked = true;
            bgMusic.play().catch(() => {
                isAudioUnlocked = false;
            });
        }
        window.addEventListener('click', () => { if(!isAudioUnlocked) unlockAudio(); });

        // Point 7 : nuage de sédiments — déclenché une seule fois au contact du fond
        const sedimentCloud = document.getElementById('sediment-cloud');
        let sedimentTriggered = false;

        function checkSedimentTrigger() {
            if (sedimentTriggered) return;
            const rect = floorElement.getBoundingClientRect();
            if (rect.top < window.innerHeight * 0.75) {
                sedimentTriggered = true;
                sedimentCloud.classList.add('active');
            }
        }

        // NOTE : l'ancien listener 'scroll' qui recalculait la profondeur, la règle,
        // la zone et les sédiments a été fusionné dans mainLoop() (voir plus haut).
        // Un listener 'scroll' séparé pouvait se déclencher beaucoup plus souvent
        // qu'une frame d'affichage et réécrivait le DOM (jusqu'à ~240 graduations
        // de règle) à chaque déclenchement, même quand la profondeur affichée
        // n'avait pas changé. mainLoop() ne fait ce travail qu'une fois par frame,
        // et seulement si la profondeur en mètres a effectivement changé.

        // ============================================================
        // POOL DE BULLES — évite la création/suppression DOM répétée
        // ------------------------------------------------------------
        // Avant : un nouvel élément div était créé toutes les 250ms puis
        // détruit ~4-7s plus tard via setTimeout (beaucoup de garbage collection
        // et de reflows d'insertion/suppression). Maintenant : un pool fixe
        // d'éléments réutilisables, recyclés via l'évènement natif 'animationend'
        // (pas de timer supplémentaire par bulle).
        // ============================================================
        const BUBBLE_POOL_SIZE = 18;
        const bubblePool = [];
        for (let i = 0; i < BUBBLE_POOL_SIZE; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            document.body.appendChild(bubble);
            bubble.addEventListener('animationend', () => {
                bubble.style.display = 'none';
                bubble.classList.remove('anim-active');
            });
            bubblePool.push(bubble);
        }

        function spawnBubble() {
            const bubble = bubblePool.find(b => !b.classList.contains('anim-active'));
            if (!bubble) return; // pool saturé (rare) : on saute cette apparition, sans impact visible

            const size = Math.random() * 6 + 3;
            const leftPos = Math.random() * window.innerWidth;
            const duration = Math.random() * 3 + 4;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${leftPos}px`;
            bubble.style.display = 'block';

            // Redémarre l'animation CSS depuis 0% (nécessaire car l'élément est réutilisé) :
            // on coupe l'animation, on force un reflow synchrone (offsetWidth), puis on la
            // réactive avec la nouvelle durée. Coût : un seul reflow sur un élément de
            // quelques pixels, sans commune mesure avec un createElement/appendChild.
            bubble.style.animation = 'none';
            void bubble.offsetWidth;
            bubble.style.animation = '';
            bubble.style.animationDuration = `${duration}s`;
            bubble.classList.add('anim-active');
        }

        function spawnContinuousBubbles() {
            setInterval(() => {
                if (window.scrollY > window.innerHeight * 0.3 && currentDepthGlobal < 1000) {
                    spawnBubble();
                }
            }, 250);
        }
        spawnContinuousBubbles();

        // ============================================================
        // POOL DE BIOLUMINESCENCE — même principe que les bulles
        // ============================================================
        const BIOLUM_POOL_SIZE = 6;
        const biolumPool = [];
        for (let i = 0; i < BIOLUM_POOL_SIZE; i++) {
            const dot = document.createElement('div');
            dot.className = 'biolum-dot';
            dot.style.display = 'none';
            document.body.appendChild(dot);
            dot.addEventListener('animationend', () => {
                dot.style.display = 'none';
                dot.classList.remove('anim-active');
            });
            biolumPool.push(dot);
        }

        // Point 6 : bioluminescence aléatoire, discrète, à partir de la zone mésopélagique (200m)
        function spawnBiolumDot() {
            const dot = biolumPool.find(d => !d.classList.contains('anim-active'));
            if (!dot) return; // pool saturé (rare, apparitions espacées) : on saute cette apparition

            const colors = ['#38bdf8', '#fb7185', '#4ade80']; // bleu, rouge, vert
            const color = colors[Math.floor(Math.random() * colors.length)];
            const size = Math.random() * 4 + 3;
            dot.style.width = `${size}px`;
            dot.style.height = `${size}px`;
            dot.style.left = `${Math.random() * 96 + 2}vw`;
            dot.style.top = `${Math.random() * 90 + 5}vh`;
            dot.style.background = color;
            dot.style.boxShadow = `0 0 10px 3px ${color}`;
            dot.style.display = 'block';

            dot.style.animation = 'none';
            void dot.offsetWidth;
            dot.style.animation = '';
            dot.classList.add('anim-active');
        }

        function scheduleNextBiolum() {
            const delay = 500 + Math.random() * 2200; // apparitions espacées, avec parcimonie
            setTimeout(() => {
                if (currentDepthGlobal >= 200) spawnBiolumDot();
                scheduleNextBiolum();
            }, delay);
        }
        scheduleNextBiolum();

        const popup = document.getElementById('media-popup');
        const popupBox = document.getElementById('popup-box');
        const closeBtn = document.getElementById('close-btn');

        // OPTIM CPU (point 5) : les vidéos d'arrière-plan continuaient de jouer/décoder
        // pendant qu'une popup mediaClick était ouverte — invisibles derrière le fond
        // flouté, mais toujours actives. On les met en pause à l'ouverture, et on ne
        // relance que celles qui étaient effectivement censées jouer (drapeau
        // shouldPlay, posé par playObserver), en cas de scroll pendant que la popup
        // était affichée.
        function pauseBackgroundVideos() {
            document.querySelectorAll('.depth-lazy-img').forEach((el) => {
                if (el.tagName === 'VIDEO' && !el.paused) el.pause();
            });
        }
        function resumeBackgroundVideos() {
            document.querySelectorAll('.depth-lazy-img').forEach((el) => {
                if (el.tagName === 'VIDEO' && el.dataset.shouldPlay === 'true' && el.readyState >= 2) {
                    el.play().catch(() => {});
                }
            });
        }

        function openPopup(mediaPath) {
            const oldMedia = popupBox.querySelector('.inserted-media');
            if (oldMedia) oldMedia.remove();

            const isVideo = mediaPath.endsWith('.mp4') || mediaPath.endsWith('.webm');
            let mediaElement;

            if (isVideo) {
                mediaElement = document.createElement('video');
                mediaElement.src = mediaPath;
                mediaElement.autoplay = true;
                mediaElement.controls = true;
                mediaElement.muted = true; // demandé : toutes les vidéos mediaClick sont muettes à l'ouverture
                mediaElement.className = 'inserted-media';
                mediaElement.onended = () => { closePopup(); };
            } else {
                mediaElement = document.createElement('img');
                mediaElement.src = mediaPath;
                mediaElement.className = 'inserted-media';
            }

            popupBox.insertBefore(mediaElement, closeBtn);
            popup.classList.add('active');
            isMediaOpen = true;
            pauseBackgroundVideos();
        }

        function closePopup() {
            popup.classList.remove('active');
            isMediaOpen = false;
            resumeBackgroundVideos();
            setTimeout(() => {
                const media = popupBox.querySelector('.inserted-media');
                if (media) media.remove();
            }, 300);
        }

        closeBtn.addEventListener('click', closePopup);
        popup.addEventListener('click', closePopup);
        popupBox.addEventListener('click', (e) => {
            if(e.target !== closeBtn && !e.target.hasAttribute('controls')) {
                closePopup();
            } else {
                e.stopPropagation();
            }
        });
    </script>
</body>
</html>
