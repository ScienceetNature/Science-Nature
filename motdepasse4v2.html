<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EscapeGame - Sport - V2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --box-w: 52px;
      --box-h: 62px;
      --gap: 8px;
      --correct: #00e676;
      --wrong: #ff1744;
      --btn-bg: #2E8B57;
      --btn-hover: #007f00;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
      height: 100vh;
      width: 100vw;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* ── Audio player ── */
    #audioPlayer {
      position: fixed;
      top: 14px; right: 18px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 30px;
      padding: 6px 14px;
      backdrop-filter: blur(6px);
    }
    #audioPlayer button {
      background: none; border: none; cursor: pointer;
      font-size: 20px; color: #fff; padding: 0;
      transition: transform 0.15s;
    }
    #audioPlayer button:hover { transform: scale(1.2); }
    #audioPlayer input[type=range] {
      width: 80px; accent-color: var(--correct); cursor: pointer;
    }

    /* ── Scene ── */
    .scene {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(255,255,255,0.2);
      user-select: none;
    }

    /* ── Password widget ── */
    .pw-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .numbers-row {
      display: flex;
      gap: var(--gap);
      margin-bottom: 8px;
      padding-right: 44px; /* align with boxes, not eye btn */
    }
    .num-label {
      width: var(--box-w);
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.05em;
      user-select: none;
    }

    /* Row containing boxes + input overlay + eye btn */
    .boxes-row {
      display: flex;
      align-items: center;
      gap: var(--gap);
      position: relative;
      cursor: text;
    }

    .letter-box {
      width: var(--box-w);
      height: var(--box-h);
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 28px;
      color: #fff;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      user-select: none;
      pointer-events: none;
    }
    .letter-box.active {
      border-color: rgba(255,255,255,0.7);
      box-shadow: 0 0 14px rgba(255,255,255,0.15);
    }
    .letter-box.correct {
      border-color: var(--correct);
      background: rgba(0,230,118,0.12);
      box-shadow: 0 0 18px rgba(0,230,118,0.35);
    }
    .letter-box.wrong {
      border-color: var(--wrong);
      background: rgba(255,23,68,0.12);
      box-shadow: 0 0 18px rgba(255,23,68,0.3);
    }
    .letter-box::after {
      content: '';
      position: absolute; inset: 0;
      background: transparent;
      border-radius: 6px;
      transition: background 0.25s;
      pointer-events: none;
    }
    .letter-box.flash-correct::after { background: rgba(0,230,118,0.5); }
    .letter-box.flash-wrong::after   { background: rgba(255,23,68,0.5); }

    /* The real input — invisible, sits over all boxes */
    #pwInput {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      opacity: 0.01; /* not 0 — some browsers skip 0-opacity inputs */
      cursor: text;
      font-size: 16px;
      border: none;
      background: transparent;
      outline: none;
      z-index: 20;
      caret-color: transparent;
      color: transparent;
      /* width set dynamically by JS */
    }

    /* Eye button */
    .eye-btn {
      background: none; border: none; cursor: pointer;
      font-size: 22px; color: rgba(255,255,255,0.45);
      padding: 4px;
      transition: color 0.2s, transform 0.15s;
      line-height: 1;
      position: relative; z-index: 21;
      flex-shrink: 0;
      width: 36px;
    }
    .eye-btn:hover { color: rgba(255,255,255,0.9); transform: scale(1.1); }

    /* ── Verify button ── */
    .check-btn {
      padding: 12px 44px;
      background: var(--btn-bg); color: #fff;
      border: none; border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(46,139,87,0.3);
    }
    .check-btn:hover { background: var(--btn-hover); box-shadow: 0 4px 28px rgba(0,127,0,0.5); }
    .check-btn:active { transform: scale(0.96); }
    .check-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Video overlay ── */
    #videoOverlay {
      position: fixed; inset: 0;
      z-index: 5;
      display: flex;
      align-items: center; justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #videoOverlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #videoOverlay video {
      max-width: 100vw; max-height: 100vh;
      width: auto; height: auto;
      object-fit: contain; opacity: 0.88;
    }
  </style>
</head>
<body>

<!-- ═══════ AUDIO ═══════ -->
<div id="audioPlayer">
  <button id="playPauseBtn">▶</button>
  <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.7">
  <span style="color:rgba(255,255,255,0.5);font-size:12px;">🎵</span>
</div>
<audio id="bgMusic" preload="none">
  <source src="Vid/skyrim.mp3" type="audio/mpeg">
</audio>

<!-- ═══════ VIDEO ═══════ -->
<div id="videoOverlay">
  <video id="theVideo" preload="none" playsinline></video>
</div>

<!-- ═══════ SCENE ═══════ -->
<div class="scene">
  <div class="title">Mot de passe</div>

  <div class="pw-wrapper" id="pwWrapper">
    <div class="numbers-row" id="numRow"></div>
    <div class="boxes-row" id="boxesRow">
      <!-- boxes + input injected by JS -->
      <button class="eye-btn" id="eyeBtn" type="button">👁</button>
    </div>
  </div>

  <button class="check-btn" id="checkBtn" type="button">Vérifier</button>
</div>

<canvas id="canvas"></canvas>

<script>
/* ══════════════════════════════════════
   ★  CONFIGURATION  ★
   ══════════════════════════════════════ */
const PASSWORD      = "cnsqotvccad";
const VIDEO_SUCCESS = "Pic/vraivrai.mp4";
const VIDEO_ERROR   = "Pic/fauxfaux.mp4";
/* ══════════════════════════════════════ */

const LEN = PASSWORD.length;
const BOX_W = 52, GAP = 8;

let typedChars  = Array(LEN).fill('');
let activeIndex = 0;
let revealed    = false;
let isVerifying = false;
let isResult    = false;

// ── Build number labels ──
const numRow   = document.getElementById('numRow');
const boxesRow = document.getElementById('boxesRow');
const eyeBtn   = document.getElementById('eyeBtn');

for (let i = 0; i < LEN; i++) {
  const lbl = document.createElement('div');
  lbl.className = 'num-label';
  lbl.textContent = i + 1;
  numRow.appendChild(lbl);
}

// ── Build letter boxes ──
for (let i = 0; i < LEN; i++) {
  const box = document.createElement('div');
  box.className = 'letter-box';
  box.id = 'box-' + i;
  boxesRow.insertBefore(box, eyeBtn);
}

// ── Build invisible input ──
const pwInput = document.createElement('input');
pwInput.id          = 'pwInput';
pwInput.type        = 'text';
pwInput.maxLength   = LEN;
pwInput.autocomplete = 'off';
pwInput.setAttribute('autocorrect', 'off');
pwInput.setAttribute('autocapitalize', 'none');
pwInput.spellcheck  = false;
// Width covers exactly the boxes (not the eye button)
pwInput.style.width = (LEN * BOX_W + (LEN - 1) * GAP) + 'px';
boxesRow.insertBefore(pwInput, eyeBtn);

// ── Focus management ──
function grabFocus() {
  if (!isVerifying && !isResult) pwInput.focus();
}

// Click anywhere on the widget → focus input
document.getElementById('pwWrapper').addEventListener('mousedown', (e) => {
  if (!e.target.closest('.eye-btn')) {
    e.preventDefault(); // prevent focus jumping to body first
    grabFocus();
  }
});

// Initial focus after DOM is ready
setTimeout(grabFocus, 100);

// ── Helpers ──
function getBox(i) { return document.getElementById('box-' + i); }

function setActive(i) {
  document.querySelectorAll('.letter-box').forEach((b, j) => {
    b.classList.toggle('active', j === i);
  });
  activeIndex = i;
}

function renderBox(i) {
  const ch = typedChars[i];
  getBox(i).textContent = ch === '' ? '' : (revealed ? ch : '•');
}

function renderAll() {
  for (let i = 0; i < LEN; i++) renderBox(i);
}

// ── Input event: user typed/deleted something ──
pwInput.addEventListener('input', () => {
  if (isVerifying || isResult) { pwInput.value = ''; return; }

  const val   = pwInput.value.slice(0, LEN);
  pwInput.value = val; // enforce max length

  typedChars = Array(LEN).fill('');
  for (let i = 0; i < val.length; i++) typedChars[i] = val[i];

  const pos = pwInput.selectionStart != null ? pwInput.selectionStart : val.length;
  setActive(Math.min(Math.max(pos - 1, 0), LEN - 1));
  renderAll();
});

// ── Keydown: Enter + arrows ──
pwInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); handleCheck(); return; }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    setTimeout(() => {
      const pos = pwInput.selectionStart;
      setActive(Math.min(Math.max((pos || 0), 0), LEN - 1));
    }, 0);
  }
});

// Track cursor moves
pwInput.addEventListener('click', () => {
  const pos = pwInput.selectionStart || 0;
  setActive(Math.min(pos, LEN - 1));
});

// ── Eye button ──
eyeBtn.addEventListener('click', () => {
  revealed = !revealed;
  eyeBtn.textContent = revealed ? '🙈' : '👁';
  renderAll();
  grabFocus();
});

// ── Verify ──
document.getElementById('checkBtn').addEventListener('click', handleCheck);

function handleCheck() {
  if (isVerifying) return;
  if (isResult) { resetGame(); return; }

  isVerifying = true;
  pwInput.disabled = true;
  document.getElementById('checkBtn').disabled = true;

  const win   = typedChars.join('').toLowerCase() === PASSWORD.toLowerCase();
  const delay = 2800 / LEN;

  for (let i = 0; i < LEN; i++) {
    (function(idx) {
      setTimeout(() => {
        const box = getBox(idx);
        const ok  = (typedChars[idx] || '').toLowerCase() === PASSWORD[idx].toLowerCase();
        box.classList.remove('active');
        box.classList.add(ok ? 'flash-correct' : 'flash-wrong');
        setTimeout(() => {
          box.classList.remove('flash-correct', 'flash-wrong');
          box.classList.add(ok ? 'correct' : 'wrong');
        }, 220);
        if (idx === LEN - 1) {
          setTimeout(() => showVideo(win), 450);
        }
      }, idx * delay);
    })(i);
  }

if (win) setTimeout(() => colorBalls(true), delay * (LEN - 1) + 220);
}

// ── Video ──
function showVideo(win) {
  const overlay = document.getElementById('videoOverlay');
  const vid     = document.getElementById('theVideo');

  // Nettoyer les anciens handlers
  vid.onloadeddata = null;
  vid.oncanplay    = null;
  vid.onended      = null;

  overlay.classList.add('visible');
  vid.src = win ? VIDEO_SUCCESS : VIDEO_ERROR;
  vid.play().catch(() => {});

  vid.onended = () => {
    vid.onended = null;
    overlay.classList.remove('visible');
    const btn = document.getElementById('checkBtn');
    btn.textContent = 'Recommencer';
    btn.disabled = false;
    isVerifying = false;
    isResult = true;
  };
}

// ── Reset ──
function resetGame() {
  // Nettoyer la vidéo proprement
  const vid = document.getElementById('theVideo');
  const overlay = document.getElementById('videoOverlay');
  vid.onended = null;
  vid.pause();
  vid.removeAttribute('src');
  vid.load();
  overlay.classList.remove('visible');

  typedChars = Array(LEN).fill('');
  pwInput.value = '';
  pwInput.disabled = false;
  for (let i = 0; i < LEN; i++) {
    const box = getBox(i);
    box.className = 'letter-box';
    box.textContent = '';
  }
  revealed = false;
  eyeBtn.textContent = '👁';
  const btn = document.getElementById('checkBtn');
  btn.textContent = 'Vérifier';
  btn.disabled = false;
  isVerifying = false;
  isResult = false;
  setActive(0);
  colorBalls(false);
  grabFocus();
}

// ── Audio ──
const bgMusic      = document.getElementById('bgMusic');
const playPauseBtn = document.getElementById('playPauseBtn');
const volSlider    = document.getElementById('volumeSlider');
let musicPlaying   = false;

bgMusic.volume = parseFloat(volSlider.value);

playPauseBtn.addEventListener('click', () => {
  if (musicPlaying) {
    bgMusic.pause();
    playPauseBtn.textContent = '▶';
    musicPlaying = false;
  } else {
    bgMusic.play().then(() => {
      playPauseBtn.textContent = '⏸';
      musicPlaying = true;
    }).catch(() => {});
  }
});

volSlider.addEventListener('input', () => {
  bgMusic.volume = parseFloat(volSlider.value);
});

bgMusic.addEventListener('ended', () => {
  bgMusic.currentTime = 0;
  bgMusic.play().catch(() => {});
});
</script>

<!-- ═══════ CANVAS ═══════ -->
<script>
  var canvas  = document.getElementById('canvas');
  var ctx     = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  var COUNT = 50, MIN_R = 1, MAX_R = 5, MIN_S = 0.5, MAX_S = 2, DIST = 100;
  var colorMode = false;
  var hues = [], balls = [];

  for (var i = 0; i < COUNT; i++) {
    hues.push(Math.random() * 360);
    balls.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * (MAX_R - MIN_R) + MIN_R,
      vx: (Math.random() * (MAX_S - MIN_S) + MIN_S) * (Math.random() < .5 ? 1 : -1),
      vy: (Math.random() * (MAX_S - MIN_S) + MIN_S) * (Math.random() < .5 ? 1 : -1),
    });
  }

  function colorBalls(on) { colorMode = on; }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < COUNT; i++) {
      var b = balls[i];
      b.x += b.vx; b.y += b.vy;
      if (b.x < b.r || b.x > canvas.width  - b.r) b.vx = -b.vx;
      if (b.y < b.r || b.y > canvas.height - b.r) b.vy = -b.vy;
      if (colorMode) hues[i] = (hues[i] + 0.5) % 360;
      var col = colorMode ? 'hsl('+hues[i]+',100%,65%)' : 'white';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = col; ctx.fill();
      for (var j = i + 1; j < COUNT; j++) {
        var b2 = balls[j];
        var d  = Math.hypot(b.x - b2.x, b.y - b2.y);
        if (d < DIST) {
          ctx.beginPath();
          ctx.moveTo(b.x, b.y); ctx.lineTo(b2.x, b2.y);
          ctx.strokeStyle = colorMode ? 'hsl('+((hues[i]+hues[j])/2)+',90%,60%)' : 'white';
          ctx.lineWidth = (DIST - d) / 20;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
</script>

</body>
</html>
